<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenConstructionERP — BOQ</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  :root{--bg:#0f1419;--panel:#1a2129;--line:#2a3441;--txt:#e6edf3;--mut:#8b98a5;--acc:#4a9eff;--ok:#3fb950}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--txt);font:14px/1.5 -apple-system,Segoe UI,Roboto,sans-serif;padding:20px}
  h1{font-size:18px;margin-bottom:4px} .sub{color:var(--mut);font-size:12px;margin-bottom:16px}
  .bar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
  select,input[type=text],button{background:var(--panel);color:var(--txt);border:1px solid var(--line);border-radius:6px;padding:8px 12px;font-size:13px}
  button{cursor:pointer} button:hover{border-color:var(--acc)} button.primary{background:var(--acc);border-color:var(--acc);color:#fff}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:16px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:14px}
  .card .v{font-size:22px;font-weight:700;margin-top:4px} .card .l{color:var(--mut);font-size:11px;text-transform:uppercase;letter-spacing:.5px}
  .grid{display:grid;grid-template-columns:1fr 1.4fr;gap:12px}
  @media(max-width:900px){.grid{grid-template-columns:1fr}}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:14px}
  table{width:100%;border-collapse:collapse;font-size:12px}
  th,td{padding:6px 8px;text-align:left;border-bottom:1px solid var(--line)}
  th{color:var(--mut);font-weight:600;position:sticky;top:0;background:var(--panel)}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  .tbl{max-height:420px;overflow:auto}
  .msg{font-size:12px;color:var(--ok);min-height:16px}
</style>
</head>
<body>
<h1>OpenConstructionERP — BOQ Dashboard</h1>
<div class="sub">Prototype 0.1 · live data via /api/v1 · <a style="color:var(--acc)" href="/docs" target="_blank">API docs</a></div>

<div class="bar">
  <select id="project"></select>
  <button id="newProj">+ New project</button>
  <select id="region"></select>
  <input type="file" id="file" accept=".xlsx" style="display:none">
  <button id="import" class="primary">Import BOQ (.xlsx)</button>
  <button id="export">Export .xlsx</button>
  <span class="msg" id="msg"></span>
</div>

<div class="cards">
  <div class="card"><div class="l">Items</div><div class="v" id="kItems">—</div></div>
  <div class="card"><div class="l">Base total</div><div class="v" id="kBase">—</div></div>
  <div class="card"><div class="l">Region factor</div><div class="v" id="kFactor">—</div></div>
  <div class="card"><div class="l">Adjusted total</div><div class="v" id="kAdj">—</div></div>
</div>

<div class="grid">
  <div class="panel"><canvas id="chart" height="260"></canvas></div>
  <div class="panel">
    <div class="bar" style="margin-bottom:10px">
      <input type="text" id="search" placeholder="Search items…" style="flex:1">
    </div>
    <div class="tbl"><table>
      <thead><tr><th>CBS</th><th>Code</th><th>Name</th><th>Unit</th>
        <th class="num">Qty</th><th class="num">Rate</th><th class="num">Total</th></tr></thead>
      <tbody id="rows"><tr><td colspan="7" style="color:var(--mut)">No project selected</td></tr></tbody>
    </table></div>
  </div>
</div>

<script>
const $=id=>document.getElementById(id);
const fmt=n=>n==null?"—":Number(n).toLocaleString("en-US",{maximumFractionDigits:0});
let chart, projectId=null;

async function api(path,opts){const r=await fetch("/api/v1"+path,opts);
  if(!r.ok){throw new Error((await r.json()).detail||r.statusText)} return r.json();}

async function loadRegions(){
  // regions come from summary errors otherwise; simple static list synced with V002
  const regs=["BASE","UZ","KZ","LT","AT","TM","GE","UA"];
  $("region").innerHTML=regs.map(r=>`<option>${r}</option>`).join("");
}
async function loadProjects(sel){
  const ps=await api("/projects");
  $("project").innerHTML=ps.length?ps.map(p=>
    `<option value="${p.id}">${p.code} — ${p.name} (${fmt(p.boq_total)} ${p.currency})</option>`).join("")
    :"<option value=''>— no projects —</option>";
  projectId=sel||$("project").value||null;
  if(sel)$("project").value=sel;
  refresh();
}
async function refresh(){
  projectId=$("project").value||null;
  if(!projectId){return}
  const region=$("region").value;
  try{
    const s=await api(`/projects/${projectId}/boq/summary?region=${region}`);
    $("kItems").textContent=fmt(s.items_count);
    $("kBase").textContent=fmt(s.base_total);
    $("kFactor").textContent=s.overall_factor.toFixed(3)+" ("+s.region+")";
    $("kAdj").textContent=fmt(s.adjusted_total);
    drawChart(s.by_chapter);
    loadItems();
  }catch(e){$("msg").textContent=e.message}
}
function drawChart(ch){
  const ctx=$("chart");
  if(chart)chart.destroy();
  chart=new Chart(ctx,{type:"bar",data:{
    labels:ch.map(c=>c.chapter+" "+(c.chapter_name||"").slice(0,18)),
    datasets:[{label:"Total",data:ch.map(c=>c.total),backgroundColor:"#4a9eff"},
              {label:"Adjusted",data:ch.map(c=>c.total_adjusted),backgroundColor:"#3fb950"}]},
    options:{indexAxis:"y",plugins:{legend:{labels:{color:"#e6edf3"}}},
      scales:{x:{ticks:{color:"#8b98a5"},grid:{color:"#2a3441"}},
              y:{ticks:{color:"#8b98a5"},grid:{display:false}}}}});
}
async function loadItems(){
  const q=$("search").value;
  const items=await api(`/projects/${projectId}/boq/items?limit=300${q?"&q="+encodeURIComponent(q):""}`);
  $("rows").innerHTML=items.length?items.map(i=>
    `<tr><td>${i.cbs_code}</td><td>${i.code}</td><td>${i.name}</td><td>${i.unit}</td>
     <td class="num">${fmt(i.quantity)}</td><td class="num">${fmt(i.unit_price)}</td>
     <td class="num">${fmt(i.total_cost)}</td></tr>`).join("")
    :`<tr><td colspan="7" style="color:var(--mut)">No items — import a BOQ .xlsx</td></tr>`;
}
$("project").onchange=refresh; $("region").onchange=refresh;
let t; $("search").oninput=()=>{clearTimeout(t);t=setTimeout(loadItems,300)};
$("import").onclick=()=>projectId?$("file").click():alert("Create/select a project first");
$("file").onchange=async e=>{
  const f=e.target.files[0]; if(!f)return;
  const fd=new FormData(); fd.append("file",f);
  $("msg").textContent="Importing…";
  try{const r=await api(`/projects/${projectId}/boq/import`,{method:"POST",body:fd});
    $("msg").textContent=`Imported ${r.imported}, skipped ${r.skipped}`;
    loadProjects(projectId);
  }catch(err){$("msg").textContent="Error: "+err.message}
  e.target.value="";
};
$("export").onclick=()=>projectId&&window.open(
  `/api/v1/projects/${projectId}/boq/export.xlsx?region=${$("region").value}`);
$("newProj").onclick=async()=>{
  const code=prompt("Project code (e.g. TAS-ML2):"); if(!code)return;
  const name=prompt("Project name:")||code;
  try{const p=await api("/projects",{method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({code,name})});
    $("msg").textContent="Project created";
    loadProjects(p.id);
  }catch(e){alert(e.message)}
};
loadRegions().then(()=>loadProjects());
</script>
</body>
</html>
