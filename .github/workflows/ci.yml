name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb-ha:pg16
        env:
          POSTGRES_DB: oce
          POSTGRES_USER: oce
          POSTGRES_PASSWORD: ci
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U oce -d oce"
          --health-interval 5s --health-timeout 3s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Python syntax check
        run: python -m compileall scripts/
      - name: Guard — no BIGSERIAL/BIGINT keys in migrations (UUID convention, WORKSTREAMS §2)
        run: |
          if grep -rnE "BIGSERIAL|_id\s+BIGINT|BIGINT\s+(PRIMARY KEY|NOT NULL REFERENCES|REFERENCES)" database/migrations/ ; then
            echo "::error::BIGSERIAL / BIGINT keys forbidden in migrations — use UUID (see docs/WORKSTREAMS.md). Plain BIGINT for sizes/counters is fine."; exit 1
          fi
      - name: Guard — duplicate migration version numbers (see docs/WORKSTREAMS.md)
        run: |
          DUPES=$(ls database/migrations/ | grep -oP '^V\d+' | sort | uniq -d)
          if [ -n "$DUPES" ]; then
            echo "::error::Duplicate migration version numbers: $DUPES — read docs/WORKSTREAMS.md, renumber your migration"
            exit 1
          fi
      - name: Install core-py dependencies
        run: pip install -r services/core-py/requirements.txt pytest
      - name: Unit tests
        run: python -m pytest tests/unit -q
      - name: Apply migrations in order (schema must always be installable)
        env:
          PGPASSWORD: ci
        run: |
          for f in $(ls database/migrations/V*.sql | sort); do
            echo ">>> $f"
            psql -h localhost -U oce -d oce -v ON_ERROR_STOP=1 -f "$f"
          done
      - name: API smoke test (health + project + ontology)
        env:
          DATABASE_URL: postgresql://oce:ci@localhost:5432/oce
          AUTH_MODE: static
          AUTH_STATIC_SECRET: ci-secret
        run: |
          cd services/core-py
          python -m uvicorn app.main:app --port 8000 &
          sleep 5
          curl -sf localhost:8000/health
          # auth: no token must be rejected
          test "$(curl -s -o /dev/null -w '%{http_code}' localhost:8000/api/v1/projects)" = "401"
          export TOKEN=$(python -c "import jwt,time;print(jwt.encode({'sub':'ci','exp':int(time.time())+600},'ci-secret',algorithm='HS256'))")
          export AUTH_HEADER="Authorization: Bearer $TOKEN"
          curl -sf -H "$AUTH_HEADER" localhost:8000/api/v1/projects >/dev/null
          curl -sf -X POST localhost:8000/api/v1/projects \
            -H "$AUTH_HEADER" -H "Content-Type: application/json" \
            -d '{"code":"CI-TEST","name":"CI smoke project"}'
          curl -sf -H "$AUTH_HEADER" "localhost:8000/api/v1/core/objects?type_code=project" | grep -q CI-TEST
