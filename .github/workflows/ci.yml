name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_DB: oce
          POSTGRES_USER: oce
          POSTGRES_PASSWORD: ci
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U oce -d oce"
          --health-interval 5s --health-timeout 3s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Python syntax check
        run: python -m compileall scripts/
      - name: Apply migrations in order (schema must always be installable)
        env:
          PGPASSWORD: ci
        run: |
          for f in $(ls database/migrations/V*.sql | sort); do
            echo ">>> $f"
            psql -h localhost -U oce -d oce -v ON_ERROR_STOP=1 -f "$f"
          done
