name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  validate-migrations:
    name: Validate SQL Migrations
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: oce
          POSTGRES_PASSWORD: oce_test
          POSTGRES_DB: oce_erp
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Run all migrations
        run: |
          for f in database/migrations/V*.sql; do
            echo "Running $f..."
            PGPASSWORD=oce_test psql -h localhost -U oce -d oce_erp -f "$f" || exit 1
          done

      - name: Verify table count
        run: |
          COUNT=$(PGPASSWORD=oce_test psql -h localhost -U oce -d oce_erp -t -c "SELECT count(*) FROM information_schema.tables WHERE table_schema='public';" | tr -d ' ')
          echo "Total tables: $COUNT"
          if [ "$COUNT" -lt 100 ]; then
            echo "ERROR: Expected at least 100 tables, got $COUNT"
            exit 1
          fi

  build-go:
    name: Build Go Binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        working-directory: services/core
        run: |
          go mod tidy
          go build -o oce-core.bin ./cmd/api/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: oce-core-binary
          path: services/core/oce-core.bin

  lint-sql:
    name: Lint SQL
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install sqlfluff
        run: pip install sqlfluff

      - name: Lint migrations
        run: |
          sqlfluff lint database/migrations/ --dialect postgres || echo "Lint warnings (non-blocking)"

  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [build-go, validate-migrations]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Download Go binary
        uses: actions/download-artifact@v4
        with:
          name: oce-core-binary
          path: infrastructure/docker/

      - name: Build Docker image
        run: |
          docker build -t oce-core:latest -f infrastructure/docker/Dockerfile .
          docker tag oce-core:latest ghcr.io/${{ github.repository }}/oce-core:latest

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker image
        run: |
          docker push ghcr.io/${{ github.repository }}/oce-core:latest
