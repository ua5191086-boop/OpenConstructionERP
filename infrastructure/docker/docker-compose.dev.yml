# OpenConstructionERP — developer stack (single node)
# Usage: docker compose -f infrastructure/docker/docker-compose.dev.yml up -d
# Migrations in database/migrations/ are applied automatically on first start (V000 -> V001 -> V002).
# BOQ dashboard: http://localhost:8000  |  API docs: http://localhost:8000/docs
name: oce-dev

services:
  postgres:
    image: timescale/timescaledb-ha:pg16
    container_name: oce-postgres
    environment:
      POSTGRES_DB: oce
      POSTGRES_USER: oce
      POSTGRES_PASSWORD: oce_dev_only
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../../database/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oce -d oce"]
      interval: 5s
      timeout: 3s
      retries: 10

  core:
    build: ../../services/core-py
    container_name: oce-core
    environment:
      DATABASE_URL: postgresql://oce:oce_dev_only@postgres:5432/oce
      AUTH_MODE: ${AUTH_MODE:-static}           # keycloak | static | disabled
      AUTH_STATIC_SECRET: ${AUTH_STATIC_SECRET:-dev_change_me}
      KEYCLOAK_URL: ${KEYCLOAK_URL:-http://oce-keycloak:8080}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-oce}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  minio:
    image: minio/minio:latest
    container_name: oce-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: oce
      MINIO_ROOT_PASSWORD: oce_dev_only
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  redis:
    image: redis:7-alpine
    container_name: oce-redis
    ports:
      - "6379:6379"

  adminer:
    image: adminer:latest
    container_name: oce-adminer
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  ai-svc:
    build: ../../services/ai-svc
    container_name: oce-ai-svc
    environment:
      AI_SVC_PORT: 8100
    ports:
      - "8100:8100"
    depends_on:
      postgres:
        condition: service_healthy

  bim-viewer:
    build: ../../apps/bim-viewer
    container_name: oce-bim-viewer
    ports:
      - "8200:80"
    depends_on:
      - core

volumes:
  pgdata:
  miniodata:
