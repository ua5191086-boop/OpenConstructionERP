x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

networks:
  oce-net:
    driver: bridge

volumes:
  oce-postgres-data:
  oce-minio-data:
  oce-redis-data:
  oce-kafka-data:
  oce-prometheus-data:

services:
  # ============================================================
  # DATABASE
  # ============================================================
  oce-postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: oce-postgres
    restart: unless-stopped
    networks: [oce-net]
    ports: ["5434:5432"]
    environment:
      POSTGRES_DB: oce
      POSTGRES_USER: oce
      POSTGRES_PASSWORD: oce_secret
    volumes:
      - oce-postgres-data:/var/lib/postgresql/data
      - ../../db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oce"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # STORAGE
  # ============================================================
  oce-minio:
    image: minio/minio:latest
    container_name: oce-minio
    restart: unless-stopped
    networks: [oce-net]
    ports: ["9002:9000", "9003:9001"]
    environment:
      MINIO_ROOT_USER: oce
      MINIO_ROOT_PASSWORD: oce_secret
    command: server /data --console-address ":9001"
    volumes:
      - oce-minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # CACHE
  # ============================================================
  oce-redis:
    image: redis:7-alpine
    container_name: oce-redis
    restart: unless-stopped
    networks: [oce-net]
    ports: ["6378:6379"]
    command: redis-server --requirepass oce_secret --appendonly yes
    volumes:
      - oce-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ============================================================
  # MESSAGE BROKER (Kafka — lightweight KRaft)
  # ============================================================
  oce-kafka:
    image: apache/kafka:3.7.0
    container_name: oce-kafka
    restart: unless-stopped
    networks: [oce-net]
    ports: ["9093:9092"]
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "bash", "-c", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ============================================================
  # AUTH — Keycloak
  # ============================================================
  oce-keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: oce-keycloak
    restart: unless-stopped
    networks: [oce-net]
    ports: ["8084:8080"]
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://oce-postgres:5432/oce
      KC_DB_USERNAME: oce
      KC_DB_PASSWORD: oce_secret
      KC_HOSTNAME: localhost
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: oce_secret
      KC_HEALTH_ENABLED: "true"
    volumes:
      - ../../infrastructure/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    command: start-dev --import-realm
    depends_on:
      oce-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 10

  # ============================================================
  # CORE API (Go) — build skipped for now, use pre-built
  # ============================================================
  oce-core:
    image: alpine:3.19
    container_name: oce-core
    restart: unless-stopped
    networks: [oce-net]
    ports: ["8085:8081"]
    environment:
      DB_HOST: oce-postgres
      DB_PORT: "5432"
      DB_USER: oce
      DB_PASSWORD: oce_secret
      DB_NAME: oce_erp
    command: sh -c "echo 'Core API placeholder — build Go binary to enable' && sleep infinity"
    depends_on:
      oce-postgres:
        condition: service_healthy
      oce-redis:
        condition: service_healthy
      oce-minio:
        condition: service_healthy

  # ============================================================
  # REACT FRONTEND (Vite + nginx multi-stage)
  # ============================================================
  oce-frontend:
    build:
      context: ../../apps/frontend
      dockerfile: Dockerfile
    container_name: oce-frontend
    restart: unless-stopped
    networks: [oce-net]
    ports: ["8086:80"]
    depends_on:
      - oce-core

  # ============================================================
  # MONITORING
  # ============================================================
  oce-prometheus:
      image: prom/prometheus:latest
      container_name: oce-prometheus
      restart: unless-stopped
      networks: [oce-net]
      ports: ["9091:9090"]
      volumes:
        - oce-prometheus-data:/prometheus
      command:
        - '--config.file=/etc/prometheus/prometheus.yml'
        - '--storage.tsdb.path=/prometheus'
        - '--web.enable-lifecycle'
  oce-grafana:
    image: grafana/grafana:latest
    container_name: oce-grafana
    restart: unless-stopped
    networks: [oce-net]
    ports: ["3002:3000"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: oce_secret
