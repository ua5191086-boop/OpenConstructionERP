<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retention & Guarantees — OpenConstructionERP</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
body{background:#0f172a;color:#e2e8f0;padding:24px}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.header h1{font-size:24px;font-weight:600;color:#f1f5f9}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:#1e293b;border-radius:12px;padding:20px;border:1px solid #334155}
.stat-card .label{font-size:12px;text-transform:uppercase;color:#94a3b8;letter-spacing:1px;margin-bottom:8px}
.stat-card .value{font-size:32px;font-weight:700;color:#f1f5f9}
.stat-card .sub{font-size:13px;color:#64748b;margin-top:4px}
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
.chart-card{background:#1e293b;border-radius:12px;padding:16px;border:1px solid #334155;min-height:360px}
.chart-card.full{grid-column:1/-1}
.chart-card h3{font-size:14px;font-weight:500;color:#94a3b8;margin-bottom:12px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 12px;color:#94a3b8;font-weight:500;border-bottom:1px solid #334155}
td{padding:8px 12px;border-bottom:1px solid #1e293b;vertical-align:top}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.badge-held{background:#f59e0b20;color:#f59e0b;border:1px solid #f59e0b40}
.badge-active{background:#22c55e20;color:#22c55e;border:1px solid #22c55e40}
.badge-expired{background:#ef444420;color:#ef4444;border:1px solid #ef444440}
.badge-released{background:#3b82f620;color:#3b82f6;border:1px solid #3b82f640}
.tab-bar{display:flex;gap:4px;margin-bottom:16px;background:#1e293b;border-radius:8px;padding:4px}
.tab{flex:1;padding:10px;text-align:center;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;color:#64748b;border:none;background:transparent;transition:all .2s}
.tab.active{background:#3b82f6;color:white}
.tab:hover:not(.active){background:#334155;color:#e2e8f0}
.panel{display:none}
.panel.active{display:block}
.rate-highlight{font-size:20px;font-weight:700;color:#22c55e}
</style>
</head>
<body>
<div class="header"><h1>💰 Retention & Guarantees</h1><span id="lastUpdate" style="color:#64748b;font-size:13px"></span></div>

<div class="tab-bar">
<button class="tab active" onclick="switchTab('retention')">Удержания</button>
<button class="tab" onclick="switchTab('guarantees')">Гарантии</button>
<button class="tab" onclick="switchTab('currency')">Курсы валют</button>
<button class="tab" onclick="switchTab('transactions')">Мультивалютные транзакции</button>
</div>

<!-- RETENTION -->
<div id="panel-retention" class="panel active">
<div class="stats-grid" id="retentionStats"></div>
<div class="chart-grid">
<div class="chart-card" id="retentionChart"></div>
<div class="chart-card">
<h3>📋 Активные удержания</h3>
<table><thead><tr><th>Контракт</th><th>Сумма</th><th>Высвобождено</th><th>Статус</th><th>Срок</th></tr></thead>
<tbody id="retentionTable"></tbody></table>
</div>
</div>
</div>

<!-- GUARANTEES -->
<div id="panel-guarantees" class="panel">
<div class="stats-grid" id="guaranteeStats"></div>
<div class="chart-grid">
<div class="chart-card" id="guaranteeTypeChart"></div>
<div class="chart-card" id="guaranteeExpiryChart"></div>
</div>
<div class="chart-card full">
<h3>📋 Все гарантии</h3>
<table><thead><tr><th>№</th><th>Тип</th><th>Банк</th><th>Сумма</th><th>До</th><th>Статус</th></tr></thead>
<tbody id="guaranteeTable"></tbody></table>
</div>
</div>

<!-- CURRENCY -->
<div id="panel-currency" class="panel">
<div class="stats-grid" id="currencyStats"></div>
<div class="chart-grid">
<div class="chart-card full" id="rateChart"></div>
</div>
<div class="chart-card full">
<h3>📋 Курсы валют</h3>
<table><thead><tr><th>Пара</th><th>Курс</th><th>Дата</th><th>Источник</th></tr></thead>
<tbody id="rateTable"></tbody></table>
</div>
</div>

<!-- MULTI-CURRENCY TX -->
<div id="panel-transactions" class="panel">
<div class="stats-grid" id="mcStats"></div>
<div class="chart-card full">
<h3>📋 Мультивалютные транзакции</h3>
<table><thead><tr><th>Тип</th><th>Откуда</th><th>Куда</th><th>Сумма source</th><th>Сумма target</th><th>Курс</th><th>Дата</th></tr></thead>
<tbody id="mcTable"></tbody></table>
</div>
</div>

<script>
const BASE = '/api/v1/protected';
let rateChart = null;

function switchTab(name) {
document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
document.querySelector(`.tab[onclick*="${name}"]`).classList.add('active');
document.getElementById(`panel-${name}`).classList.add('active');
}

function parseDate(d) { return d ? new Date(d).toLocaleDateString('ru-RU') : '-' }

function sum(arr, key) { return arr.reduce((s, i) => s + (parseFloat(i[key])||0), 0) }

// RETENTION
async function loadRetention() {
try {
const {data} = await axios.get(`${BASE}/retention`);
const active = data.filter(r => r.release_status === 'held' || r.release_status === 'partially_released');
const totalHeld = sum(data, 'retention_amount');
const totalReleased = sum(data, 'released_amount');
document.getElementById('retentionStats').innerHTML = `
<div class="stat-card"><div class="label">Всего удержаний</div><div class="value">${data.length}</div><div class="sub">записей</div></div>
<div class="stat-card"><div class="label">Активных</div><div class="value">${active.length}</div><div class="sub">удержаний</div></div>
<div class="stat-card"><div class="label">Сумма удержаний</div><div class="value">${totalHeld.toLocaleString()}</div><div class="sub">USD</div></div>
<div class="stat-card"><div class="label">Высвобождено</div><div class="value">${totalReleased.toLocaleString()}</div><div class="sub">USD</div></div>
`;
const byStatus = {};
data.forEach(r => { const s = r.release_status||'unknown'; byStatus[s] = (byStatus[s]||0)+1 });
const rc = echarts.init(document.getElementById('retentionChart'));
rc.setOption({
title:{show:false}, tooltip:{trigger:'item', formatter:'{b}: {c} ({d}%)'},
series:[{type:'pie', radius:['40%','70%'], data:Object.entries(byStatus).map(([k,v])=>({name:k,value:v})),
itemStyle:{borderColor:'#1e293b',borderWidth:2}, label:{color:'#94a3b8',fontSize:11}}]
});
document.getElementById('retentionTable').innerHTML = data.filter(r => r.release_status !== 'fully_released').slice(0,20).map(r => `
<tr><td>${r.contract_id?.slice(0,8)||'-'}</td><td>${(+r.retention_amount).toLocaleString()}</td>
<td>${(+r.released_amount||0).toLocaleString()}</td><td><span class="badge badge-${r.release_status==='held'?'held':'active'}">${r.release_status}</span></td>
<td>${r.release_date?parseDate(r.release_date):'-'}</td></tr>`).join('');
} catch(e) { console.error('retention',e) }
}

// GUARANTEES
async function loadGuarantees() {
try {
const {data} = await axios.get(`${BASE}/guarantees`);
const active = data.filter(g => g.status === 'active');
const totalAmount = sum(data, 'amount');
document.getElementById('guaranteeStats').innerHTML = `
<div class="stat-card"><div class="label">Всего гарантий</div><div class="value">${data.length}</div><div class="sub">записей</div></div>
<div class="stat-card"><div class="label">Активных</div><div class="value">${active.length}</div><div class="sub">гарантий</div></div>
<div class="stat-card"><div class="label">Общая сумма</div><div class="value">${totalAmount.toLocaleString()}</div><div class="sub">USD</div></div>
<div class="stat-card"><div class="label">Истекает в ближ. 30 дней</div><div class="value" id="expiringCount">...</div><div class="sub">гарантий</div></div>
`;
const byType = {};
data.forEach(g => { byType[g.guarantee_type] = (byType[g.guarantee_type]||0)+1 });
const tc = echarts.init(document.getElementById('guaranteeTypeChart'));
tc.setOption({
title:{show:false}, tooltip:{trigger:'item', formatter:'{b}: {c}'},
series:[{type:'pie', radius:['40%','70%'], data:Object.entries(byType).map(([k,v])=>({name:k,value:v})),
itemStyle:{borderColor:'#1e293b',borderWidth:2}, label:{color:'#94a3b8',fontSize:11}}]
});
const expiryByMonth = {};
data.filter(g=>g.status==='active').forEach(g => {
const m = g.expiry_date ? g.expiry_date.slice(0,7) : 'unknown';
expiryByMonth[m] = (expiryByMonth[m]||0)+1
});
const ec = echarts.init(document.getElementById('guaranteeExpiryChart'));
ec.setOption({
title:{show:false}, tooltip:{trigger:'axis'},
xAxis:{type:'category',data:Object.keys(expiryByMonth).sort(),axisLabel:{color:'#94a3b8',fontSize:11}},
yAxis:{type:'value',axisLabel:{color:'#94a3b8'}},
series:[{type:'bar',data:Object.entries(expiryByMonth).sort((a,b)=>a[0].localeCompare(b[0])).map(([,v])=>v),
itemStyle:{color:'#f59e0b',borderRadius:[4,4,0,0]}}],
grid:{left:50,right:20,bottom:30}
});
window.addEventListener('resize',()=>ec.resize());
document.getElementById('guaranteeTable').innerHTML = data.map(g => `
<tr><td>${g.guarantee_number?.slice(0,20)||'-'}</td>
<td>${g.guarantee_type||'-'}</td><td>${g.issuer_bank?.slice(0,25)||'-'}</td>
<td>${(+g.amount).toLocaleString()}</td><td>${parseDate(g.expiry_date)}</td>
<td><span class="badge badge-${g.status}">${g.status}</span></td></tr>`).join('');
document.getElementById('expiringCount').textContent = data.filter(g => {
if(!g.expiry_date||g.status!=='active') return false;
const e = new Date(g.expiry_date); const n = new Date();
const d = Math.ceil((e-n)/(86400000));
return d >=0 && d <=30;
}).length;
} catch(e) { console.error('guarantees',e) }
}

// CURRENCY
async function loadCurrency() {
try {
const {data} = await axios.get(`${BASE}/currency-rates`);
const pairs = [...new Set(data.map(r => `${r.base_currency}/${r.target_currency}`))];
document.getElementById('currencyStats').innerHTML = `
<div class="stat-card"><div class="label">Всего курсов</div><div class="value">${data.length}</div><div class="sub">записей</div></div>
<div class="stat-card"><div class="label">Валютных пар</div><div class="value">${pairs.length}</div><div class="sub">пар</div></div>
`;
if(rateChart) rateChart.dispose();
rateChart = echarts.init(document.getElementById('rateChart'));
const grouped = {};
data.forEach(r => {
const key = `${r.base_currency}/${r.target_currency}`;
if(!grouped[key]) grouped[key] = [];
grouped[key].push({date:r.rate_date,rate:parseFloat(r.rate)});
});
const series = Object.entries(grouped).map(([name, points]) => ({
name, type:'line', smooth:true,
data: points.sort((a,b)=>a.date.localeCompare(b.date)).map(p => [p.date, p.rate])
}));
rateChart.setOption({
title:{show:false}, tooltip:{trigger:'axis'},
legend:{data:series.map(s=>s.name),textStyle:{color:'#94a3b8',fontSize:11}},
xAxis:{type:'time',axisLabel:{color:'#94a3b8',fontSize:10}},
yAxis:{type:'value',axisLabel:{color:'#94a3b8'}},
series,
grid:{left:60,right:30,bottom:30}
});
window.addEventListener('resize',()=>rateChart.resize());
document.getElementById('rateTable').innerHTML = data.slice(0,50).map(r => `
<tr><td class="rate-highlight">${r.base_currency}/${r.target_currency}</td>
<td>${parseFloat(r.rate).toFixed(4)}</td><td>${parseDate(r.rate_date)}</td>
<td>${r.source||'-'}</td></tr>`).join('');
} catch(e) { console.error('currency',e) }
}

// MC TRANSACTIONS
async function loadMCTx() {
try {
const {data} = await axios.get(`${BASE}/mc-transactions`);
const totalSource = sum(data, 'source_amount');
const totalTarget = sum(data, 'target_amount');
const realizedGL = sum(data, 'realized_gain_loss');
document.getElementById('mcStats').innerHTML = `
<div class="stat-card"><div class="label">Всего транзакций</div><div class="value">${data.length}</div></div>
<div class="stat-card"><div class="label">Source сумма</div><div class="value">${totalSource.toLocaleString()}</div><div class="sub">USD</div></div>
<div class="stat-card"><div class="label">Target сумма</div><div class="value">${totalTarget.toLocaleString()}</div><div class="sub">итоговая</div></div>
<div class="stat-card"><div class="label">Курсовая разница</div><div class="value">${realizedGL.toLocaleString()}</div><div class="sub">прибыль/убыток</div></div>
`;
document.getElementById('mcTable').innerHTML = data.slice(0,30).map(t => `
<tr><td>${t.transaction_type||'-'}</td><td>${t.source_currency||'-'}</td>
<td>${t.target_currency||'-'}</td><td>${(+t.source_amount).toLocaleString()}</td>
<td>${(+t.target_amount).toLocaleString()}</td><td>${parseFloat(t.exchange_rate).toFixed(4)}</td>
<td>${parseDate(t.transaction_date)}</td></tr>`).join('');
} catch(e) { console.error('mc',e) }
}

async function init() {
document.getElementById('lastUpdate').textContent = `Обновлено: ${new Date().toLocaleString('ru-RU')}`;
await Promise.all([loadRetention(), loadGuarantees(), loadCurrency(), loadMCTx()]);
}
init();
</script>
</body>
</html>
