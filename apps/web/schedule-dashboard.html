<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schedule & CPM — OpenConstructionERP</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
.container { max-width: 1400px; margin: 0 auto; padding: 20px; }
.header { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); padding: 20px 30px; border-radius: 12px; margin-bottom: 24px; border: 1px solid #334155; }
.header h1 { font-size: 24px; color: #f1f5f9; }
.header p { color: #94a3b8; font-size: 14px; margin-top: 4px; }
.filters { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
.filters select, .filters input, .filters button { background: #1e293b; border: 1px solid #334155; color: #e2e8f0; padding: 10px 16px; border-radius: 8px; font-size: 14px; }
.filters button { background: #3b82f6; border-color: #3b82f6; cursor: pointer; font-weight: 600; }
.filters button:hover { background: #2563eb; }
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
.stat-card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 20px; }
.stat-card .label { font-size: 12px; text-transform: uppercase; color: #94a3b8; letter-spacing: 0.5px; }
.stat-card .value { font-size: 28px; font-weight: 700; margin-top: 8px; color: #f1f5f9; }
.stat-card .sub { font-size: 13px; color: #64748b; margin-top: 4px; }
.stat-card.danger { border-left: 3px solid #ef4444; }
.stat-card.warning { border-left: 3px solid #f59e0b; }
.stat-card.success { border-left: 3px solid #22c55e; }
.stat-card.info { border-left: 3px solid #3b82f6; }
.chart-card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 20px; margin-bottom: 24px; }
.chart-card h3 { font-size: 14px; color: #94a3b8; margin-bottom: 16px; text-transform: uppercase; letter-spacing: 0.5px; }
.table-card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 20px; margin-bottom: 24px; overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
th { text-align: left; padding: 12px 8px; font-size: 12px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid #334155; }
td { padding: 10px 8px; border-bottom: 1px solid #1e293b; font-size: 13px; }
tr:hover { background: #1e293b; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
.badge-green { background: #166534; color: #86efac; }
.badge-yellow { background: #854d0e; color: #fde047; }
.badge-red { background: #991b1b; color: #fca5a5; }
.badge-blue { background: #1e3a5f; color: #93c5fd; }
.badge-critical { background: #7f1d1d; color: #fca5a5; }
.progress-bar { width: 100%; height: 8px; background: #1e293b; border-radius: 4px; overflow: hidden; margin-top: 4px; }
.progress-bar .fill { height: 100%; border-radius: 4px; }
.gantt { position: relative; }
.gantt-row { display: flex; align-items: center; margin-bottom: 4px; font-size: 12px; }
.gantt-label { width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding-right: 8px; flex-shrink: 0; }
.gantt-bar { height: 20px; border-radius: 3px; position: relative; min-width: 4px; }
.gantt-bar .pct { position: absolute; right: 4px; top: 2px; font-size: 10px; color: white; }
.gantt-scale { display: flex; margin-bottom: 4px; font-size: 10px; color: #64748b; }
.gantt-scale div { flex: 1; text-align: center; }
.loading { text-align: center; padding: 60px; color: #64748b; }
.loading .spinner { width: 40px; height: 40px; border: 3px solid #334155; border-top-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px; }
@keyframes spin { to { transform: rotate(360deg); } }
.error { text-align: center; padding: 40px; color: #fca5a5; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>📅 Календарно-сетевое планирование (CPM)</h1>
    <p>Расписания, критический путь, Gantt, сравнение с базовым планом</p>
  </div>

  <div class="filters">
    <select id="scheduleSelect"><option value="">Выберите расписание</option></select>
    <button onclick="loadSchedule()">📊 Загрузить</button>
    <button onclick="runCPM()" style="background:#f59e0b;border-color:#f59e0b">⚡ CPM Расчёт</button>
    <button onclick="showBaseline()" style="background:#8b5cf6;border-color:#8b5cf6">📋 Сравнить с базой</button>
  </div>

  <div class="stats-grid" id="statsGrid" style="display:none"></div>
  <div class="chart-card" id="ganttCard" style="display:none"></div>
  <div class="table-card" id="activityCard" style="display:none"></div>
  <div class="table-card" id="cpmResult" style="display:none"></div>
</div>

<script>
let schedules = [];
let activities = [];
let cpmData = null;

async function init() {
  try {
    const resp = await fetch('/api/v1/protected/schedule/schedules');
    if (!resp.ok) throw new Error('API недоступен');
    schedules = await resp.json();
    const sel = document.getElementById('scheduleSelect');
    sel.innerHTML = '<option value="">Выберите расписание</option>' +
      schedules.map(s => `<option value="${s.id}">${s.schedule_code || ''} — ${s.schedule_name || ''} [${s.status}]</option>`).join('');
  } catch(e) {
    document.getElementById('statsGrid').innerHTML = `<div class="error">❌ ${e.message}</div>`;
  }
}

async function loadSchedule() {
  const sid = document.getElementById('scheduleSelect').value;
  if (!sid) return;

  try {
    const [actResp, ganttResp] = await Promise.all([
      fetch(`/api/v1/protected/schedule/activities?schedule_id=${sid}`).then(r => r.ok ? r.json() : []),
      fetch(`/api/v1/protected/schedule/gantt/${sid}`).then(r => r.ok ? r.json() : []),
    ]);
    activities = Array.isArray(ganttResp) ? ganttResp : (Array.isArray(actResp) ? actResp : []);

    const total = activities.length;
    const completed = activities.filter(a => a.status === 'completed').length;
    const inProgress = activities.filter(a => a.status === 'in_progress').length;
    const critical = activities.filter(a => a.is_critical).length;
    const pct = total > 0 ? ((completed / total) * 100).toFixed(1) : 0;

    document.getElementById('statsGrid').style.display = 'grid';
    document.getElementById('statsGrid').innerHTML = `
      <div class="stat-card info"><div class="label">Активностей</div><div class="value">${total}</div></div>
      <div class="stat-card success"><div class="label">Завершено</div><div class="value">${completed}</div><div class="sub">${pct}%</div></div>
      <div class="stat-card warning"><div class="label">В работе</div><div class="value">${inProgress}</div></div>
      <div class="stat-card ${critical > 0 ? 'danger' : 'success'}"><div class="label">Критический путь</div><div class="value">${critical}</div><div class="sub">операций на критическом пути</div></div>
    `;

    renderGantt();
    renderActivities();
  } catch(e) {
    document.getElementById('statsGrid').innerHTML = `<div class="error">❌ ${e.message}</div>`;
  }
}

function renderGantt() {
  const card = document.getElementById('ganttCard');
  card.style.display = 'block';
  const maxDur = Math.max(...activities.map(a => a.original_duration || 1), 1);
  const barWidth = 600;

  card.innerHTML = `
    <h3>📊 Gantt-диаграмма</h3>
    <div class="gantt-scale">
      ${Array.from({length: Math.min(maxDur, 20)}, (_, i) => `<div>${i + 1}</div>`).join('')}
    </div>
    ${activities.map(a => {
      const dur = a.original_duration || 1;
      const pct = a.percent_complete || 0;
      const isCrit = a.is_critical;
      const color = isCrit ? '#ef4444' : a.status === 'completed' ? '#22c55e' : a.status === 'in_progress' ? '#3b82f6' : '#64748b';
      const w = Math.max(4, (dur / maxDur) * barWidth);
      return `<div class="gantt-row">
        <div class="gantt-label">${a.activity_id || ''} - ${(a.activity_name || '').substring(0, 30)}</div>
        <div class="gantt-bar" style="width:${w}px;background:${color}">
          <span class="pct">${a.status === 'completed' ? '✓' : Math.round(pct) + '%'}</span>
        </div>
      </div>`;
    }).join('')}
    <div style="margin-top:12px;font-size:12px;color:#64748b">
      <span style="color:#ef4444">■</span> Критический путь &nbsp;
      <span style="color:#3b82f6">■</span> В работе &nbsp;
      <span style="color:#22c55e">■</span> Завершено &nbsp;
      <span style="color:#64748b">■</span> Не начато
    </div>
  `;
}

function renderActivities() {
  const card = document.getElementById('activityCard');
  card.style.display = 'block';
  card.innerHTML = `
    <h3 style="font-size:14px;color:#94a3b8;margin-bottom:16px;text-transform:uppercase;letter-spacing:0.5px;">📋 Активности</h3>
    <table>
      <thead><tr>
        <th>ID</th><th>Наименование</th><th>Тип</th><th>Статус</th><th>Длит.</th><th>%</th><th>Float</th><th>Ранний старт</th><th>Ранний финиш</th>
      </tr></thead>
      <tbody>
        ${activities.map(a => {
          const stBadge = a.status === 'completed' ? 'badge-green' : a.status === 'in_progress' ? 'badge-yellow' : a.is_critical ? 'badge-critical' : 'badge-blue';
          return `<tr>
            <td><strong>${a.activity_id || ''}</strong></td>
            <td>${a.activity_name || ''}<br><small style="color:#64748b">${a.wbs_code || ''}</small></td>
            <td><span class="badge badge-blue">${a.activity_type || ''}</span></td>
            <td><span class="badge ${stBadge}">${a.status || ''}</span></td>
            <td>${a.original_duration || 0}</td>
            <td>
              ${(a.percent_complete || 0).toFixed(0)}%
              <div class="progress-bar"><div class="fill" style="width:${Math.min(a.percent_complete || 0, 100)}%;background:${a.is_critical ? '#ef4444' : '#3b82f6'}"></div></div>
            </td>
            <td>${a.float_total ?? '-'}</td>
            <td><small>${a.early_start || '—'}</small></td>
            <td><small>${a.early_finish || '—'}</small></td>
          </tr>`;
        }).join('')}
        ${activities.length === 0 ? '<tr><td colspan="9" style="text-align:center;color:#64748b;padding:40px;">Нет активностей. Создайте расписание и добавьте активности.</td></tr>' : ''}
      </tbody>
    </table>
  `;
}

async function runCPM() {
  const sid = document.getElementById('scheduleSelect').value;
  if (!sid) return;
  
  document.getElementById('cpmResult').style.display = 'block';
  document.getElementById('cpmResult').innerHTML = '<div class="loading"><div class="spinner"></div>CPM расчёт...</div>';

  try {
    const resp = await fetch(`/api/v1/protected/schedule/cpm-calculate/${sid}`, {method: 'POST'});
    if (!resp.ok) throw new Error('CPM расчёт не удался');
    cpmData = await resp.json();

    document.getElementById('cpmResult').innerHTML = `
      <h3 style="font-size:14px;color:#94a3b8;margin-bottom:16px;text-transform:uppercase;letter-spacing:0.5px;">
        ⚡ Результат CPM
      </h3>
      <div style="margin-bottom:16px">
        <span style="background:#1e293b;padding:8px 16px;border-radius:8px;margin-right:12px;display:inline-block">
          🏗️ Длительность проекта: <strong>${cpmData.project_duration} дней</strong>
        </span>
        <span style="background:#7f1d1d;padding:8px 16px;border-radius:8px;display:inline-block">
          🔴 Критических: <strong>${cpmData.critical_count}</strong>
        </span>
      </div>
      <table>
        <thead><tr>
          <th>Активность</th><th>Длит.</th><th>ES</th><th>EF</th><th>LS</th><th>LF</th><th>Float</th><th>Крит.</th>
        </tr></thead>
        <tbody>
          ${(cpmData.activities || []).map(a => `<tr>
            <td><strong>${a.activity_id}</strong></td>
            <td>${a.duration}</td>
            <td>${a.es}</td><td>${a.ef}</td><td>${a.ls}</td><td>${a.lf}</td>
            <td><span class="badge ${a.is_critical ? 'badge-critical' : 'badge-green'}">${a.float_total}</span></td>
            <td>${a.is_critical ? '🔴' : '✅'}</td>
          </tr>`).join('')}
        </tbody>
      </table>
      ${cpmData.critical_path ? `<div style="margin-top:12px;font-size:12px;color:#64748b">🔗 Критический путь: ${cpmData.critical_path.join(' → ')}</div>` : ''}
    `;
    loadSchedule();
  } catch(e) {
    document.getElementById('cpmResult').innerHTML = `<div class="error">❌ ${e.message}</div>`;
  }
}

async function showBaseline() {
  const sid = document.getElementById('scheduleSelect').value;
  if (!sid) return;

  try {
    const resp = await fetch(`/api/v1/protected/schedule/baseline-compare/${sid}`);
    if (!resp.ok) throw new Error('Нет базового плана');
    const data = await resp.json();
    const pct = data.activities ? (data.activities.filter(a => a.variance_days > 0).length / data.activities.length * 100).toFixed(1) : 0;

    let html = `
      <div style="margin-bottom:16px;padding:16px;background:#1e293b;border-radius:8px">
        <span style="margin-right:20px">📋 Отклонение от базового плана: <strong>${data.total_variance_days} дней</strong></span>
        <span style="margin-right:20px">⚠️ Просрочено: <strong>${data.late_activities}</strong> (${pct}%)</span>
        <span>🔴 На критическом пути: <strong>${data.critical_activities}</strong></span>
      </div>
      <table>
        <thead><tr><th>Активность</th><th>Статус</th><th>База (дн.)</th><th>Осталось</th><th>Факт</th><th>%</th><th>Откл.</th><th>Крит.</th></tr></thead>
        <tbody>
          ${(data.activities || []).map(a => `<tr>
            <td><strong>${a.activity_id}</strong><br><small>${a.activity_name || ''}</small></td>
            <td><span class="badge ${a.status === 'completed' ? 'badge-green' : a.status === 'in_progress' ? 'badge-yellow' : a.is_critical ? 'badge-critical' : 'badge-blue'}">${a.status || ''}</span></td>
            <td>${a.baseline_duration}</td>
            <td>${a.remaining_duration}</td>
            <td>${a.actual_duration}</td>
            <td>${(a.percent_complete || 0).toFixed(0)}%</td>
            <td><span class="badge ${a.variance_days > 0 ? 'badge-red' : 'badge-green'}">${a.variance_days > 0 ? '+' : ''}${a.variance_days}</span></td>
            <td>${a.is_critical ? '🔴' : '—'}</td>
          </tr>`).join('')}
        </tbody>
      </table>`;

    document.getElementById('cpmResult').style.display = 'block';
    document.getElementById('cpmResult').innerHTML = `
      <h3 style="font-size:14px;color:#94a3b8;margin-bottom:16px;text-transform:uppercase;letter-spacing:0.5px;">📋 Сравнение с базовым планом</h3>
      ${html}
    `;
  } catch(e) {
    document.getElementById('cpmResult').style.display = 'block';
    document.getElementById('cpmResult').innerHTML = `<div class="error">❌ ${e.message}</div>`;
  }
}

document.getElementById('scheduleSelect').addEventListener('change', loadSchedule);
init();
</script>
</body>
</html>
