<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenConstructionERP — Laboratory</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f172a;color:#e2e8f0}
.header{background:linear-gradient(135deg,#1e293b 0%,#0f172a 100%);border-bottom:1px solid #334155;padding:20px 30px;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:24px;font-weight:700;color:#f8fafc}
.header h1 span{color:#3b82f6}
.header .sub{color:#94a3b8;font-size:14px}
.controls{padding:16px 30px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;background:#1e293b;border-bottom:1px solid #334155}
.controls select,.controls button{padding:8px 16px;border-radius:8px;border:1px solid #334155;background:#0f172a;color:#e2e8f0;font-size:14px;cursor:pointer}
.controls button{background:#3b82f6;color:#fff;border:none;font-weight:600}
.controls button:hover{background:#2563eb}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;padding:20px 30px}
.stat-card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:16px;text-align:center}
.stat-card .label{color:#94a3b8;font-size:11px;text-transform:uppercase;letter-spacing:0.5px}
.stat-card .value{font-size:22px;font-weight:700;margin-top:6px}
.stat-card .value.green{color:#22c55e}
.stat-card .value.blue{color:#3b82f6}
.stat-card .value.yellow{color:#eab308}
.stat-card .value.red{color:#ef4444}
.charts{display:grid;grid-template-columns:repeat(auto-fit,minmax(450px,1fr));gap:20px;padding:0 30px 20px}
.chart-card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:20px}
.chart-card h3{color:#f8fafc;font-size:15px;margin-bottom:14px}
.chart-card canvas{max-height:280px;width:100%!important}
.tables{display:grid;grid-template-columns:1fr 1fr;gap:20px;padding:0 30px 30px}
.table-card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:20px;overflow-x:auto}
.table-card h3{color:#f8fafc;font-size:15px;margin-bottom:12px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 6px;border-bottom:2px solid #334155;color:#94a3b8;font-size:11px;text-transform:uppercase}
td{padding:8px 6px;border-bottom:1px solid #1e293b}
tr:hover td{background:#1a1f2e}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px}
.badge-green{background:#1a3a2a;color:#4ade80}
.badge-red{background:#3a1a1a;color:#f87171}
.badge-yellow{background:#3a2a1a;color:#fbbf24}
.badge-blue{background:#1a2a3a;color:#60a5fa}
@media(max-width:768px){.charts,.tables{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="header">
  <div><h1>🔬 <span>OpenConstructionERP</span> — Laboratory</h1><div class="sub">V029 • Material Testing, Equipment, Sampling</div></div>
  <div style="text-align:right;font-size:12px;color:#64748b" id="updateTime"></div>
</div>
<div class="controls">
  <label style="color:#94a3b8;font-size:13px">Material:</label>
  <select id="materialSelect"><option value="">— All —</option><option>concrete</option><option>steel</option><option>soil</option><option>aggregate</option></select>
  <button onclick="loadData()">Refresh</button>
</div>
<div class="stats" id="statsKpi"></div>
<div class="charts">
  <div class="chart-card"><h3>🧪 Tests by Status</h3><canvas id="testStatusChart"></canvas></div>
  <div class="chart-card"><h3>📊 Concrete Strength Distribution</h3><canvas id="concreteChart"></canvas></div>
  <div class="chart-card"><h3>🧱 Soil Types</h3><canvas id="soilChart"></canvas></div>
  <div class="chart-card"><h3>⚙️ Equipment Status</h3><canvas id="equipChart"></canvas></div>
</div>
<div class="tables">
  <div class="table-card"><h3>📋 Recent Material Tests</h3><table><thead><tr><th>Test#</th><th>Material</th><th>Type</th><th>Result</th><th>Status</th></tr></thead><tbody id="testTable"></tbody></table></div>
  <div class="table-card"><h3>🔧 Lab Equipment</h3><table><thead><tr><th>Equipment</th><th>Code</th><th>Status</th><th>Next Cal</th></tr></thead><tbody id="equipTable"></tbody></table></div>
</div>
<script>
const API_BASE = '/api/v1/protected/lab';
let CHART_INSTANCES = {};
const COLORS = ['#3b82f6','#22c55e','#a855f7','#f97316','#ef4444','#eab308','#06b6d4'];

async function loadData() {
  try {
    const [tests, concrete, soil, steel, certs, equip, samples] = await Promise.all([
      fetch(`${API_BASE}/tests`).then(r=>r.ok?r.json():[]),
      fetch(`${API_BASE}/concrete-tests`).then(r=>r.ok?r.json():[]),
      fetch(`${API_BASE}/soil-tests`).then(r=>r.ok?r.json():[]),
      fetch(`${API_BASE}/steel-tests`).then(r=>r.ok?r.json():[]),
      fetch(`${API_BASE}/certificates`).then(r=>r.ok?r.json():[]),
      fetch(`${API_BASE}/equipment`).then(r=>r.ok?r.json():[]),
      fetch(`/api/v1/protected/lab/samples`).then(r=>r.ok?r.json():[]).catch(()=>[]),
    ]);
    renderDashboard(tests, concrete, soil, steel, equip);
  } catch(e) {
    const m = genMock();
    renderDashboard(m.tests, m.concrete, m.soil, m.steel, m.equip);
  }
}
function genMock() {
  const tests = Array.from({length:20},(_,i)=>({test_number:`TST-${i+1}`,material_type:['concrete','steel','soil'][i%3],test_type:['compression','tensile','proctor'][i%3],result:`${(Math.random()*40+10).toFixed(1)} MPa`,status:['pending','completed','in_progress'][i%3]}));
  const concrete = Array.from({length:12},(_,i)=>({concrete_grade:`C${[16,20,25,30,35,40][i%6]}/${[20,25,30,37,45,50][i%6]}`,actual_strength_mpa:Math.random()*40+20}));
  const soil = Array.from({length:10},(_,i)=>({soil_type:['clay','silt','sand','gravel'][i%4],moisture_content_pct:Math.random()*30+5}));
  const steel = Array.from({length:8},(_,i)=>({steel_grade:['S235','S275','S355','S460'][i%4],yield_strength_mpa:Math.random()*200+235}));
  const equip = Array.from({length:8},(_,i)=>({equipment_name:`Lab Equipment ${i+1}`,equipment_code:`LAB-EQ-${i+1}`,status:['operational','calibration_due','maintenance'][i%3],next_calibration_date:new Date(Date.now()+Math.random()*365*86400000).toISOString().slice(0,10)}));
  return {tests, concrete, soil, steel, equip};
}
function renderDashboard(tests, concrete, soil, steel, equip) {
  document.getElementById('updateTime').textContent = new Date().toISOString().slice(0,19).replace('T',' ');
  const completed = tests.filter(t=>t.status==='completed').length;
  const pending = tests.filter(t=>t.status==='pending').length;
  document.getElementById('statsKpi').innerHTML = `
    <div class="stat-card"><div class="label">Total Tests</div><div class="value blue">${tests.length}</div></div>
    <div class="stat-card"><div class="label">Completed</div><div class="value green">${completed}</div></div>
    <div class="stat-card"><div class="label">Pending</div><div class="value yellow">${pending}</div></div>
    <div class="stat-card"><div class="label">Concrete Tests</div><div class="value purple">${concrete.length}</div></div>
    <div class="stat-card"><div class="label">Soil Tests</div><div class="value blue">${soil.length}</div></div>
    <div class="stat-card"><div class="label">Equipment</div><div class="value green">${equip.length}</div></div>`;
  const g = {}; tests.forEach(t => { g[t.status||'other'] = (g[t.status||'other']||0)+1; });
  renderChart('testStatusChart','doughnut',Object.keys(g),Object.values(g),COLORS,'Tests');
  const cg = {C16:{},C20:{},C25:{},C30:{},C35:{}};
  concrete.forEach(c => { const gr = c.concrete_grade?.split('/')[0]||'Other'; cg[gr] = (cg[gr]||0)+1; });
  renderChart('concreteChart','bar',Object.keys(cg).filter(k=>typeof cg[k]==='number'),Object.keys(cg).filter(k=>typeof cg[k]==='number').map(k=>cg[k]),'#3b82f6','Count');
  // fix concrete chart
  const cg2 = {}; concrete.forEach(c => { const k = c.concrete_grade?.split('/')[0]||'Other'; cg2[k]=(cg2[k]||0)+1; });
  renderChart('concreteChart','bar',Object.keys(cg2),Object.values(cg2),'#3b82f6','Count');
  const sg = {}; soil.forEach(s => { sg[s.soil_type||'other'] = (sg[s.soil_type||'other']||0)+1; });
  renderChart('soilChart','pie',Object.keys(sg),Object.values(sg),['#eab308','#a855f7','#f97316','#06b6d4','#84cc16'],'Soil Types');
  const eg = {}; equip.forEach(e => { eg[e.status||'other'] = (eg[e.status||'other']||0)+1; });
  renderChart('equipChart','doughnut',Object.keys(eg),Object.values(eg),['#22c55e','#f97316','#eab308','#ef4444'],'Equipment');
  renderTestTable(tests);
  renderEquipTable(equip);
}
function renderChart(id, type, labels, data, colors, label) {
  if(CHART_INSTANCES[id]) CHART_INSTANCES[id].destroy();
  const ctx = document.getElementById(id).getContext('2d');
  CHART_INSTANCES[id] = new Chart(ctx, {
    type, data: { labels, datasets: [{ label: label||'', data, backgroundColor: Array.isArray(colors)?colors:[colors], borderColor: Array.isArray(colors)?colors:'#1e293b', borderWidth: 1 }]},
    options: { responsive:true, maintainAspectRatio:true, plugins: { legend: { labels: { color:'#94a3b8', font:{size:11} } } },
      scales: type==='bar' ? { y: { beginAtZero:true, ticks: { color:'#64748b', font:{size:10} }, grid: { color:'#1e293b' } }, x: { ticks: { color:'#64748b', font:{size:10} } } } : {} }
  });
}
function renderTestTable(tests) {
  document.getElementById('testTable').innerHTML = tests.slice(0,15).map(t => `
    <tr><td>${t.test_number||''}</td><td>${t.material_type||''}</td><td>${t.test_type||''}</td><td>${t.result||''}</td>
    <td><span class="badge badge-${t.status==='completed'?'green':t.status==='pending'?'yellow':'blue'}">${t.status||''}</span></td></tr>
  `).join('');
}
function renderEquipTable(equip) {
  document.getElementById('equipTable').innerHTML = equip.map(e => `
    <tr><td>${e.equipment_name||''}</td><td>${e.equipment_code||''}</td>
    <td><span class="badge badge-${e.status==='operational'?'green':e.status==='calibration_due'?'yellow':'red'}">${e.status||''}</span></td>
    <td>${(e.next_calibration_date||'').slice(0,10)}</td></tr>
  `).join('');
}
document.addEventListener('DOMContentLoaded', loadData);
</script>
</body>
</html>
