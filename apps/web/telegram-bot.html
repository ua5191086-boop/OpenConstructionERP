<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telegram Bot — OpenConstructionERP</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:#0f172a; color:#e2e8f0; padding:20px; }
h1 { color:#38bdf8; margin-bottom:20px; }
.card { background:#1e293b; border-radius:12px; padding:20px; margin-bottom:20px; }
.card h2 { color:#94a3b8; font-size:14px; text-transform:uppercase; margin-bottom:12px; }
table { width:100%; border-collapse:collapse; }
th, td { text-align:left; padding:10px 8px; border-bottom:1px solid #334155; font-size:13px; }
th { color:#64748b; font-weight:600; }
.status-active { color:#22c55e; }
.status-inactive { color:#ef4444; }
.badge { display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:600; }
.badge-green { background:#166534; color:#86efac; }
.badge-blue { background:#1e3a5f; color:#93c5fd; }
.badge-yellow { background:#713f12; color:#fde68a; }
.btn { display:inline-block; padding:8px 16px; border-radius:8px; border:none; cursor:pointer; font-size:13px; font-weight:600; }
.btn-primary { background:#2563eb; color:white; }
.btn-danger { background:#dc2626; color:white; }
.btn-sm { padding:4px 10px; font-size:11px; }
input, select { background:#0f172a; border:1px solid #334155; color:#e2e8f0; padding:8px 12px; border-radius:8px; font-size:13px; width:100%; }
.form-group { margin-bottom:12px; }
.form-group label { display:block; color:#94a3b8; font-size:12px; margin-bottom:4px; }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
@media(max-width:768px) { .grid-2, .form-row { grid-template-columns:1fr; } }
</style>
</head>
<body>
<h1>🤖 Telegram Bot Integration</h1>

<div class="grid-2">
  <div class="card">
    <h2>➕ Add Bot</h2>
    <form id="botForm">
      <div class="form-group">
        <label>Chat ID (Telegram)</label>
        <input type="text" id="chatId" placeholder="-1001234567890" required>
      </div>
      <div class="form-group">
        <label>Chat Title</label>
        <input type="text" id="chatTitle" placeholder="Project Chat">
      </div>
      <div class="form-group">
        <label>Bot Token (encrypted)</label>
        <input type="password" id="botToken" placeholder="123456:ABC-DEF1234ghIkl-zyx57W2v1u123ew11">
      </div>
      <div class="form-group">
        <label>Notification Types</label>
        <select id="notifTypes" multiple style="height:100px">
          <option value="alerts" selected>🚨 Alerts</option>
          <option value="daily_summary" selected>📊 Daily Summary</option>
          <option value="approvals" selected>✅ Approvals</option>
          <option value="ncr">📋 NCR Notifications</option>
          <option value="hse">⚠️ HSE Incidents</option>
          <option value="milestones">🎯 Milestones</option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary" style="margin-top:12px">Add Bot</button>
    </form>
  </div>

  <div class="card">
    <h2>📤 Send Message</h2>
    <form id="sendForm">
      <div class="form-group">
        <label>Bot ID</label>
        <select id="sendBotId"></select>
      </div>
      <div class="form-group">
        <label>Chat ID</label>
        <input type="text" id="sendChatId" placeholder="-1001234567890">
      </div>
      <div class="form-group">
        <label>Message (HTML supported)</label>
        <textarea id="sendMessage" rows="4" style="width:100%;background:#0f172a;border:1px solid #334155;color:#e2e8f0;padding:8px;border-radius:8px;font-size:13px;" placeholder="<b>NCR-001</b> opened"></textarea>
      </div>
      <button type="submit" class="btn btn-primary" style="margin-top:12px">Send</button>
    </form>
  </div>
</div>

<div class="card">
  <h2>📋 Configured Bots</h2>
  <table>
    <thead><tr><th>Chat ID</th><th>Title</th><th>Notifications</th><th>Status</th><th>Created</th><th>Actions</th></tr></thead>
    <tbody id="botsTable"></tbody>
  </table>
</div>

<div class="card">
  <h2>💬 Recent Messages</h2>
  <table>
    <thead><tr><th>Bot</th><th>Chat</th><th>Message</th><th>Direction</th><th>Status</th><th>Time</th></tr></thead>
    <tbody id="messagesTable"></tbody>
  </table>
</div>

<script>
const API = '/api/v1';

async function api(path, opts={}) {
  const res = await fetch(API + path, {
    headers: {'Content-Type':'application/json', ...opts.headers},
    ...opts
  });
  return res.json();
}

async function loadBots() {
  const data = await api('/telegram-bot');
  const bots = data.data || [];
  const tbody = document.getElementById('botsTable');
  tbody.innerHTML = bots.map(b => `
    <tr>
      <td><code>${b.chat_id}</code></td>
      <td>${b.chat_title || '—'}</td>
      <td>${(b.notification_types||[]).map(t => `<span class="badge badge-blue">${t}</span>`).join(' ')}</td>
      <td><span class="${b.is_active ? 'status-active' : 'status-inactive'}">${b.is_active ? 'Active' : 'Inactive'}</span></td>
      <td>${new Date(b.created_at).toLocaleDateString()}</td>
      <td>
        <button class="btn btn-sm btn-danger" onclick="deleteBot('${b.id}')">Delete</button>
      </td>
    </tr>
  `).join('');

  // Update send form select
  const sel = document.getElementById('sendBotId');
  sel.innerHTML = bots.map(b => `<option value="${b.id}">${b.chat_title || b.chat_id}</option>`).join('');
}

async function loadMessages() {
  const data = await api('/telegram-bot');
  const bots = data.data || [];
  const tbody = document.getElementById('messagesTable');
  let allMsgs = [];

  for (const bot of bots) {
    const msgData = await api(`/telegram-bot/${bot.id}/messages`);
    const msgs = msgData.data || [];
    allMsgs = allMsgs.concat(msgs.map(m => ({...m, botTitle: bot.chat_title || bot.chat_id})));
  }

  allMsgs.sort((a,b) => new Date(b.created_at) - new Date(a.created_at)).slice(0,50);

  tbody.innerHTML = allMsgs.map(m => `
    <tr>
      <td>${m.botTitle}</td>
      <td><code>${m.chat_id}</code></td>
      <td>${m.text.substring(0,60)}${m.text.length>60?'...':''}</td>
      <td><span class="badge ${m.direction==='outgoing'?'badge-green':'badge-yellow'}">${m.direction}</span></td>
      <td>${m.status}</td>
      <td>${new Date(m.created_at).toLocaleString()}</td>
    </tr>
  `).join('');
}

document.getElementById('botForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const sel = document.getElementById('notifTypes');
  const types = Array.from(sel.selectedOptions).map(o => o.value);
  await api('/telegram-bot', {
    method: 'POST',
    body: JSON.stringify({
      chat_id: document.getElementById('chatId').value,
      chat_title: document.getElementById('chatTitle').value || undefined,
      bot_token_encrypted: document.getElementById('botToken').value || undefined,
      notification_types: types
    })
  });
  document.getElementById('botForm').reset();
  loadBots();
});

document.getElementById('sendForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const botId = document.getElementById('sendBotId').value;
  const chatId = document.getElementById('sendChatId').value;
  const msg = document.getElementById('sendMessage').value;
  if (!botId) return alert('Select a bot first');
  await api(`/telegram-bot/${botId}/send`, {
    method: 'POST',
    body: JSON.stringify({ chat_id: chatId, message: msg })
  });
  document.getElementById('sendMessage').value = '';
  loadMessages();
});

async function deleteBot(id) {
  if (!confirm('Delete this bot?')) return;
  await api(`/telegram-bot/${id}`, { method: 'DELETE' });
  loadBots();
}

loadBots();
loadMessages();
setInterval(loadMessages, 30000);
</script>
</body>
</html>
