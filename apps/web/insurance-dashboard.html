<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenConstructionERP — Insurance</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f172a;color:#e2e8f0}
.header{background:linear-gradient(135deg,#1e293b 0%,#0f172a 100%);border-bottom:1px solid #334155;padding:20px 30px;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:24px;font-weight:700;color:#f8fafc}
.header h1 span{color:#3b82f6}
.header .sub{color:#94a3b8;font-size:14px}
.controls{padding:16px 30px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;background:#1e293b;border-bottom:1px solid #334155}
.controls select,.controls button{padding:8px 16px;border-radius:8px;border:1px solid #334155;background:#0f172a;color:#e2e8f0;font-size:14px;cursor:pointer}
.controls button{background:#3b82f6;color:#fff;border:none;font-weight:600}
.controls button:hover{background:#2563eb}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;padding:20px 30px}
.stat-card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:16px;text-align:center}
.stat-card .label{color:#94a3b8;font-size:11px;text-transform:uppercase;letter-spacing:0.5px}
.stat-card .value{font-size:22px;font-weight:700;margin-top:6px}
.stat-card .value.green{color:#22c55e}
.stat-card .value.blue{color:#3b82f6}
.stat-card .value.yellow{color:#eab308}
.stat-card .value.red{color:#ef4444}
.charts{display:grid;grid-template-columns:repeat(auto-fit,minmax(450px,1fr));gap:20px;padding:0 30px 20px}
.chart-card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:20px}
.chart-card h3{color:#f8fafc;font-size:15px;margin-bottom:14px}
.chart-card canvas{max-height:280px;width:100%!important}
.tables{display:grid;grid-template-columns:1fr 1fr;gap:20px;padding:0 30px 30px}
.table-card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:20px;overflow-x:auto}
.table-card h3{color:#f8fafc;font-size:15px;margin-bottom:12px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 6px;border-bottom:2px solid #334155;color:#94a3b8;font-size:11px;text-transform:uppercase}
td{padding:8px 6px;border-bottom:1px solid #1e293b}
tr:hover td{background:#1a1f2e}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px}
.badge-green{background:#1a3a2a;color:#4ade80}
.badge-red{background:#3a1a1a;color:#f87171}
.badge-yellow{background:#3a2a1a;color:#fbbf24}
.badge-blue{background:#1a2a3a;color:#60a5fa}
@media(max-width:768px){.charts,.tables{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="header">
  <div><h1>🛡️ <span>OpenConstructionERP</span> — Insurance</h1><div class="sub">V031 • Policies, Claims, Brokers, Certificates</div></div>
  <div style="text-align:right;font-size:12px;color:#64748b" id="updateTime"></div>
</div>
<div class="controls">
  <label style="color:#94a3b8;font-size:13px">Broker:</label>
  <select id="brokerFilter"><option value="">— All —</option></select>
  <button onclick="loadData()">Refresh</button>
</div>
<div class="stats" id="statsKpi"></div>
<div class="charts">
  <div class="chart-card"><h3>📊 Policies by Status</h3><canvas id="policyChart"></canvas></div>
  <div class="chart-card"><h3>📋 Claims by Status</h3><canvas id="claimChart"></canvas></div>
  <div class="chart-card"><h3>💰 Premiums Paid vs Due</h3><canvas id="premiumChart"></canvas></div>
  <div class="chart-card"><h3>🏦 Policies by Type</h3><canvas id="policyTypeChart"></canvas></div>
</div>
<div class="tables">
  <div class="table-card"><h3>📋 Active Policies</h3><table><thead><tr><th>Policy#</th><th>Type</th><th>Insurer</th><th>Sum Insured</th><th>Status</th></tr></thead><tbody id="policyTable"></tbody></table></div>
  <div class="table-card"><h3>⚠️ Recent Claims</h3><table><thead><tr><th>Claim#</th><th>Type</th><th>Amount</th><th>Status</th></tr></thead><tbody id="claimTable"></tbody></table></div>
</div>
<script>
const API_BASE = '/api/v1/protected/insurance';
let CHART_INSTANCES = {};
const COLORS = ['#22c55e','#3b82f6','#eab308','#ef4444','#a855f7'];

async function loadData() {
  try {
    const [policies, claims, coverage, premiums, brokers, certs] = await Promise.all([
      fetch(`${API_BASE}/policies`).then(r=>r.ok?r.json():[]),
      fetch(`${API_BASE}/claims`).then(r=>r.ok?r.json():[]),
      fetch(`${API_BASE}/coverage`).catch(()=>[]),
      fetch(`${API_BASE}/premiums`).catch(()=>[]),
      fetch(`${API_BASE}/brokers`).then(r=>r.ok?r.json():[]),
      fetch(`${API_BASE}/certificates`).catch(()=>[]),
    ]);
    renderDashboard(policies, claims, premiums, brokers);
  } catch(e) {
    const m = genMock();
    renderDashboard(m.policies, m.claims, m.premiums, m.brokers);
  }
}
function genMock() {
  const policies = Array.from({length:12},(_,i)=>({policy_number:`POL-${i+1}`,policy_type:['construction_all_risk','third_party_liability','professional_indemnity'][i%3],insurer:['AIG','Allianz','Zurich'][i%3],sum_insured:(i+1)*2000000,status:['active','active','expired','active'][i%4]}));
  const claims = Array.from({length:8},(_,i)=>({claim_number:`CLM-${i+1}`,incident_type:['accident','fire','flood','collapse'][i%4],estimated_amount:(i+1)*50000,status:['submitted','adjusting','settled','approved'][i%4]}));
  const premiums = Array.from({length:12},(_,i)=>({amount_due:50000+(i*10000),amount_paid:i%3===0?null:40000+(i*10000),status:['paid','due','overdue'][i%3]}));
  const brokers = Array.from({length:5},(_,i)=>({broker_name:`Broker ${i+1}`,id:`b${i}`}));
  return {policies, claims, premiums, brokers};
}
function renderDashboard(policies, claims, premiums, brokers) {
  document.getElementById('updateTime').textContent = new Date().toISOString().slice(0,19).replace('T',' ');
  const active = policies.filter(p=>p.status==='active').length;
  const totalSum = policies.reduce((s,p)=>s+(p.sum_insured||0),0);
  const openClaims = claims.filter(c=>c.status!=='settled'&&c.status!=='rejected').length;
  document.getElementById('statsKpi').innerHTML = `
    <div class="stat-card"><div class="label">Policies</div><div class="value blue">${policies.length}</div></div>
    <div class="stat-card"><div class="label">Active</div><div class="value green">${active}</div></div>
    <div class="stat-card"><div class="label">Total Sum Insured</div><div class="value purple">$${(totalSum/1e6).toFixed(1)}M</div></div>
    <div class="stat-card"><div class="label">Open Claims</div><div class="value yellow">${openClaims}</div></div>
    <div class="stat-card"><div class="label">Brokers</div><div class="value blue">${brokers.length}</div></div>
    <div class="stat-card"><div class="label">Premiums</div><div class="value green">${premiums.length}</div></div>`;
  const pg = {}; policies.forEach(p => { pg[p.status||'other'] = (pg[p.status||'other']||0)+1; });
  renderChart('policyChart','doughnut',Object.keys(pg),Object.values(pg),COLORS,'Policies');
  const cg = {}; claims.forEach(c => { cg[c.status||'other'] = (cg[c.status||'other']||0)+1; });
  renderChart('claimChart','pie',Object.keys(cg),Object.values(cg),['#f97316','#eab308','#ef4444','#22c55e','#3b82f6'],'Claims');
  const paid = premiums.filter(p=>p.status==='paid'||p.amount_paid).reduce((s,p)=>s+(p.amount_paid||0),0);
  const due = premiums.reduce((s,p)=>s+(p.amount_due||0),0);
  renderChart('premiumChart','bar',['Paid','Due'],[paid,due],['#22c55e','#f97316'],'Amount');
  const ptg = {}; policies.forEach(p => { ptg[p.policy_type||'other'] = (ptg[p.policy_type||'other']||0)+1; });
  renderChart('policyTypeChart','bar',Object.keys(ptg),Object.values(ptg),'#3b82f6','By Type');
  renderPolicyTable(policies);
  renderClaimTable(claims);
}
function renderChart(id, type, labels, data, colors, label) {
  if(CHART_INSTANCES[id]) CHART_INSTANCES[id].destroy();
  const ctx = document.getElementById(id).getContext('2d');
  CHART_INSTANCES[id] = new Chart(ctx, {
    type, data: { labels, datasets: [{ label: label||'', data, backgroundColor: Array.isArray(colors)?colors:[colors], borderColor: Array.isArray(colors)?colors:'#1e293b', borderWidth: 1 }]},
    options: { responsive:true, maintainAspectRatio:true, plugins: { legend: { labels: { color:'#94a3b8', font:{size:11} } } },
      scales: type==='bar' ? { y: { beginAtZero:true, ticks: { color:'#64748b', font:{size:10} }, grid: { color:'#1e293b' } }, x: { ticks: { color:'#64748b', font:{size:10} } } } : {} }
  });
}
function renderPolicyTable(policies) {
  document.getElementById('policyTable').innerHTML = policies.filter(p=>p.status==='active').slice(0,10).map(p => `
    <tr><td>${p.policy_number||''}</td><td>${(p.policy_type||'').replace(/_/g,' ')}</td><td>${p.insurer||''}</td>
    <td>$${((p.sum_insured||0)/1e6).toFixed(2)}M</td>
    <td><span class="badge badge-green">${p.status||''}</span></td></tr>
  `).join('');
}
function renderClaimTable(claims) {
  document.getElementById('claimTable').innerHTML = claims.slice(0,8).map(c => `
    <tr><td>${c.claim_number||''}</td><td>${(c.incident_type||'').replace(/_/g,' ')}</td>
    <td>$${((c.estimated_amount||0)/1000).toFixed(0)}K</td>
    <td><span class="badge badge-${c.status==='settled'?'green':c.status==='approved'?'blue':c.status==='rejected'?'red':'yellow'}">${c.status||''}</span></td></tr>
  `).join('');
}
document.addEventListener('DOMContentLoaded', loadData);
</script>
</body>
</html>
