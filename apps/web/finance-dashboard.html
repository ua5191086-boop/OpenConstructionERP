<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenConstructionERP — Финансы</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f172a;color:#e2e8f0}
.header{background:linear-gradient(135deg,#1e293b 0%,#0f172a 100%);border-bottom:1px solid #334155;padding:20px 30px;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:24px;font-weight:700;color:#f8fafc}
.header h1 span{color:#3b82f6}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;padding:20px 30px}
.stat-card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:20px}
.stat-card .label{color:#94a3b8;font-size:13px;text-transform:uppercase}
.stat-card .value{font-size:28px;font-weight:700;margin-top:8px}
.stat-card .value.green{color:#22c55e}
.stat-card .value.blue{color:#3b82f6}
.stat-card .value.yellow{color:#eab308}
.stat-card .value.red{color:#ef4444}
.charts{display:grid;grid-template-columns:repeat(auto-fit,minmax(400px,1fr));gap:20px;padding:0 30px 20px}
.chart-card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:20px}
.chart-card h3{color:#f8fafc;font-size:16px;margin-bottom:16px}
.chart-card canvas{max-height:300px}
.projects{padding:0 30px 30px}
.projects h2{font-size:20px;margin-bottom:16px;color:#f8fafc}
.proj-card{background:#1e293b;border:1px solid #334155;border-radius:12px;margin-bottom:16px;padding:20px}
.proj-card h3{color:#3b82f6;font-size:16px;margin-bottom:12px}
.proj-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #1e293b;font-size:14px}
.proj-row .label{color:#94a3b8}
.proj-row .value{font-weight:600}
.status-badge{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600}
.status-green{background:#1a3a2a;color:#4ade80}
.status-yellow{background:#3a2a1a;color:#fbbf24}
.status-red{background:#3a1a1a;color:#f87171}
</style>
</head>
<body>
<div class="header">
  <div><h1>💰 <span>OpenConstructionERP</span> — Финансы</h1><div style="color:#94a3b8;font-size:14px;margin-top:4px;">Бюджетирование, Cash Flow, План-факт</div></div>
  <div style="text-align:right;font-size:12px;color:#64748b" id="updateTime"></div>
</div>
<div class="stats" id="stats"></div>
<div class="charts">
  <div class="chart-card"><h3>📊 Cash Flow — План vs Факт</h3><canvas id="cfChart"></canvas></div>
  <div class="chart-card"><h3>💰 Бюджет проектов</h3><canvas id="budgetChart"></canvas></div>
  <div class="chart-card"><h3>📈 Отклонения</h3><canvas id="varChart"></canvas></div>
  <div class="chart-card"><h3>🏷️ Статус проектов</h3><canvas id="statusChart"></canvas></div>
</div>
<div class="projects" id="projList"><h2>📋 Финансовая сводка по проектам</h2></div>
<script>
const MONTHS=['Янв','Фев','Мар','Апр','Май','Июн','Июл','Авг','Сен','Окт','Ноя','Дек'];
const PROJECTS=['Метро Алматы — Барлык','Ливнёвая канализация Алматы','Микротоннель Астана','Ж/Д ветка Туркестан'];
function rand(a,b){return Math.random()*(b-a)+a;}
function genData(){
  const data=[];
  let totalBudget=0,totalPlan=0,totalActual=0;
  const allPlan=[],allActual=[];
  PROJECTS.forEach((p,i)=>{
    const budget=Math.round(rand(10e6,500e6)*100)/100;
    totalBudget+=budget;
    const cfPlan=[],cfActual=[];
    for(let m=0;m<12;m++){
      const plan=Math.round(budget/12*rand(0.5,1.5)*100)/100;
      const actual=Math.round(plan*rand(0.7,1.1)*100)/100;
      cfPlan.push(plan);cfActual.push(actual);
      allPlan[m]=(allPlan[m]||0)+plan;
      allActual[m]=(allActual[m]||0)+actual;
    }
    const tp=cfPlan.reduce((s,v)=>s+v,0);
    const ta=cfActual.reduce((s,v)=>s+v,0);
    totalPlan+=tp;totalActual+=ta;
    const varPct=Math.round((tp-ta)/tp*10000)/100;
    data.push({project:p,budget,cfPlan,cfActual,totalPlan:tp,totalActual:ta,variance:Math.round((tp-ta)*100)/100,variancePct:varPct,status:varPct<5?'green':varPct<15?'yellow':'red'});
  });
  return {data,totalBudget,totalPlan,totalActual,allPlan,allActual};
}
const {data,totalBudget,totalPlan,totalActual,allPlan,allActual}=genData();
function renderStats(){
  document.getElementById('stats').innerHTML=`
    <div class="stat-card"><div class="label">Общий бюджет</div><div class="value blue">$${(totalBudget/1e6).toFixed(1)}M</div></div>
    <div class="stat-card"><div class="label">План (год)</div><div class="value yellow">$${(totalPlan/1e6).toFixed(1)}M</div></div>
    <div class="stat-card"><div class="label">Факт (год)</div><div class="value green">$${(totalActual/1e6).toFixed(1)}M</div></div>
    <div class="stat-card"><div class="label">Отклонение</div><div class="value ${totalPlan>totalActual?'green':'red'}">${totalPlan>totalActual?'−':'+'}$${(Math.abs(totalPlan-totalActual)/1e6).toFixed(1)}M</div></div>`;
}
function renderCharts(){
  new Chart(document.getElementById('cfChart'),{type:'bar',data:{labels:MONTHS,datasets:[{label:'План',data:allPlan.map(v=>v/1e6),backgroundColor:'#64748b',borderRadius:4},{label:'Факт',data:allActual.map(v=>v/1e6),backgroundColor:'#22c55e',borderRadius:4}]},options:{responsive:true,plugins:{legend:{position:'bottom',labels:{color:'#94a3b8'}}},scales:{y:{beginAtZero:true,ticks:{callback:v=>'$'+v.toFixed(0)+'M',color:'#94a3b8'},grid:{color:'#1e293b'}},x:{ticks:{color:'#94a3b8'}}}}});
  new Chart(document.getElementById('budgetChart'),{type:'bar',data:{labels:data.map(d=>d.project.length>20?d.project.slice(0,20)+'...':d.project),datasets:[{label:'Бюджет, $M',data:data.map(d=>d.budget/1e6),backgroundColor:['#3b82f6','#22c55e','#eab308','#a855f7'],borderRadius:4}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{callback:v=>'$'+v.toFixed(0)+'M',color:'#94a3b8'},grid:{color:'#1e293b'}},x:{ticks:{color:'#94a3b8',font:{size:10}}}}}});
  new Chart(document.getElementById('varChart'),{type:'bar',data:{labels:data.map(d=>d.project.length>20?d.project.slice(0,20)+'...':d.project),datasets:[{label:'Отклонение, %',data:data.map(d=>d.variancePct),backgroundColor:data.map(d=>d.status==='green'?'#22c55e':d.status==='yellow'?'#eab308':'#ef4444'),borderRadius:4}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{callback:v=>v+'%',color:'#94a3b8'},grid:{color:'#1e293b'}},x:{ticks:{color:'#94a3b8',font:{size:10}}}}}});
  const sc={};data.forEach(d=>{sc[d.status]=(sc[d.status]||0)+1;});
  new Chart(document.getElementById('statusChart'),{type:'doughnut',data:{labels:Object.keys(sc).map(k=>k==='green'?'✅ В норме':k==='yellow'?'⚠️ Внимание':'🔴 Критично'),datasets:[{data:Object.values(sc),backgroundColor:['#22c55e','#eab308','#ef4444'],borderWidth:0}]},options:{responsive:true,plugins:{legend:{position:'bottom',labels:{color:'#94a3b8'}}}}});
}
function renderProjects(){
  const sl={green:'✅ В норме',yellow:'⚠️ Внимание',red:'🔴 Критично'};
  let html='<h2>📋 Финансовая сводка по проектам</h2>';
  data.forEach(d=>{
    html+=`<div class="proj-card"><h3>${d.project}</h3>
      <div class="proj-row"><span class="label">Бюджет</span><span class="value">$${d.budget.toLocaleString()}</span></div>
      <div class="proj-row"><span class="label">План (год)</span><span class="value">$${d.totalPlan.toLocaleString()}</span></div>
      <div class="proj-row"><span class="label">Факт (год)</span><span class="value">$${d.totalActual.toLocaleString()}</span></div>
      <div class="proj-row"><span class="label">Отклонение</span><span class="value" style="color:${d.status==='green'?'#22c55e':d.status==='yellow'?'#eab308':'#ef4444'}">${d.variancePct}%</span></div>
      <div class="proj-row"><span class="label">Статус</span><span class="value"><span class="status-badge status-${d.status}">${sl[d.status]}</span></span></div>
    </div>`;
  });
  document.getElementById('projList').innerHTML=html;
}
document.getElementById('updateTime').textContent='Обновлено: '+new Date().toLocaleString('ru-RU');
renderStats();renderCharts();renderProjects();
</script>
</body>
</html>
