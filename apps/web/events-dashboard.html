<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenConstructionERP — Events Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f172a;color:#e2e8f0}
.header{background:linear-gradient(135deg,#1e293b 0%,#0f172a 100%);border-bottom:1px solid #334155;padding:20px 30px;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:24px;font-weight:700;color:#f8fafc}
.header h1 span{color:#3b82f6}
.header .sub{color:#94a3b8;font-size:14px}
.controls{padding:16px 30px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;background:#1e293b;border-bottom:1px solid #334155}
.controls button{background:#3b82f6;color:#fff;padding:8px 16px;border:none;border-radius:8px;font-weight:600;cursor:pointer}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;padding:20px 30px}
.stat-card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:16px;text-align:center}
.stat-card .label{color:#94a3b8;font-size:11px;text-transform:uppercase;letter-spacing:0.5px}
.stat-card .value{font-size:22px;font-weight:700;margin-top:6px}
.charts{display:grid;grid-template-columns:repeat(auto-fit,minmax(450px,1fr));gap:20px;padding:0 30px 20px}
.chart-card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:20px}
.chart-card h3{color:#f8fafc;font-size:15px;margin-bottom:14px}
.chart-card canvas{max-height:280px;width:100%!important}
.tables{padding:0 30px 30px}
.table-card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:20px;overflow-x:auto}
.table-card h3{color:#f8fafc;font-size:15px;margin-bottom:12px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 6px;border-bottom:2px solid #334155;color:#94a3b8;font-size:11px;text-transform:uppercase}
td{padding:8px 6px;border-bottom:1px solid #1e293b}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px}
.badge-green{background:#1a3a2a;color:#4ade80}
.badge-red{background:#3a1a1a;color:#f87171}
.badge-yellow{background:#3a2a1a;color:#fbbf24}
.badge-blue{background:#1a2a3a;color:#60a5fa}
</style>
</head>
<body>
<div class="header">
  <div><h1>📨 <span>OpenConstructionERP</span> — Events</h1><div class="sub">V028 • Kafka Event Bus — Topics, Events, Consumers</div></div>
  <div style="font-size:12px;color:#64748b" id="updateTime"></div>
</div>
<div class="controls">
  <button onclick="location.reload()">Refresh</button>
</div>
<div class="stats" id="statsKpi"></div>
<div class="charts">
  <div class="chart-card"><h3>📨 Events by Type</h3><canvas id="eventsTypeChart"></canvas></div>
  <div class="chart-card"><h3>⚡ Consumer Status</h3><canvas id="consumerChart"></canvas></div>
</div>
<div class="tables">
  <div class="table-card"><h3>📋 Kafka Topics</h3><table><thead><tr><th>Topic</th><th>Partitions</th><th>Status</th></tr></thead><tbody id="topicsTable"></tbody></table></div>
  <div class="table-card" style="margin-top:20px"><h3>👥 Consumers</h3><table><thead><tr><th>Name</th><th>Group</th><th>Topic</th><th>Lag</th><th>Status</th></tr></thead><tbody id="consumersTable"></tbody></table></div>
</div>
<script>
const EVENTS_API = '/api/v1/protected/events';
async function loadData() {
  try {
    const [topics, events, consumers] = await Promise.all([
      fetch(`${EVENTS_API}/topics`).then(r=>r.ok?r.json():[]),
      fetch(`${EVENTS_API}/events`).then(r=>r.ok?r.json():[]),
      fetch(`${EVENTS_API}/consumers`).then(r=>r.ok?r.json():[]),
    ]);
    renderDashboard(topics, events, consumers);
  } catch(e) {
    const m = genMock();
    renderDashboard(m.topics, m.events, m.consumers);
  }
}
function genMock() {
  const topics = Array.from({length:6},(_,i)=>({topic_name:`oce.${['project','finance','hse','quality','contract','change'][i]}.event`,partitions:[1,3,6][i%3],is_active:true}));
  const events = Array.from({length:20},(_,i)=>({event_type:['project.created','contract.signed','payment.processed','incident.reported','change.approved'][i%5],topic_name:`oce.${['project','finance','hse','quality','contract','change'][i%6]}.event`}));
  const consumers = Array.from({length:4},(_,i)=>({consumer_name:['funding-sync','notification-svc','analytics-pipeline','audit-logger'][i],consumer_group:`oce-${['funding','notify','analytics','audit'][i]}-group`,topic_name:`oce.${['project','finance','hse','quality'][i%4]}.event`,lag_count:i*20,status:['running','running','lagging','running'][i]}));
  return {topics, events, consumers};
}
function renderDashboard(topics, events, consumers) {
  document.getElementById('updateTime').textContent = new Date().toISOString().slice(0,19).replace('T',' ');
  document.getElementById('statsKpi').innerHTML = `
    <div class="stat-card"><div class="label">Topics</div><div class="value blue">${topics.length}</div></div>
    <div class="stat-card"><div class="label">Events</div><div class="value green">${events.length}</div></div>
    <div class="stat-card"><div class="label">Consumers</div><div class="value purple">${consumers.length}</div></div>
    <div class="stat-card"><div class="label">Running</div><div class="value green">${consumers.filter(c=>c.status==='running').length}</div></div>`;
  const g = {}; events.forEach(e => { g[e.event_type||'other'] = (g[e.event_type||'other']||0)+1; });
  renderChart('eventsTypeChart','bar',Object.keys(g),Object.values(g),'#3b82f6','Events');
  const cg = {}; consumers.forEach(c => { cg[c.status||'unknown'] = (cg[c.status||'unknown']||0)+1; });
  renderChart('consumerChart','pie',Object.keys(cg),Object.values(cg),['#22c55e','#f97316','#eab308','#ef4444'],'Consumers');
  document.getElementById('topicsTable').innerHTML = topics.map(t => `
    <tr><td>${t.topic_name||''}</td><td>${t.partitions||''}</td><td><span class="badge badge-${t.is_active!==false?'green':'red'}">${t.is_active!==false?'active':'inactive'}</span></td></tr>
  `).join('');
  document.getElementById('consumersTable').innerHTML = consumers.map(c => `
    <tr><td>${c.consumer_name||''}</td><td>${c.consumer_group||''}</td><td>${c.topic_name||''}</td><td>${c.lag_count??0}</td>
    <td><span class="badge badge-${c.status==='running'?'green':c.status==='lagging'?'yellow':'red'}">${c.status||''}</span></td></tr>
  `).join('');
}
let CHART_INSTANCES = {};
function renderChart(id, type, labels, data, colors, label) {
  if(CHART_INSTANCES[id]) CHART_INSTANCES[id].destroy();
  const ctx = document.getElementById(id).getContext('2d');
  CHART_INSTANCES[id] = new Chart(ctx, {
    type, data: { labels, datasets: [{ label: label||'', data, backgroundColor: type==='bar' ? colors : (Array.isArray(colors)?colors:[colors]), borderColor: type==='bar' ? colors : '#1e293b', borderWidth: 1 }]},
    options: { responsive:true, maintainAspectRatio:true, plugins: { legend: { labels: { color:'#94a3b8', font:{size:11} } } },
      scales: type==='bar' ? { y: { beginAtZero:true, ticks: { color:'#64748b', font:{size:10} }, grid: { color:'#1e293b' } }, x: { ticks: { color:'#64748b', font:{size:10} } } } : {} }
  });
}
document.addEventListener('DOMContentLoaded', loadData);
</script>
</body>
</html>
