<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Dashboard — OpenConstructionERP</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:#0f172a; color:#e2e8f0; padding:20px; }
h1 { color:#38bdf8; margin-bottom:20px; }
.card { background:#1e293b; border-radius:12px; padding:20px; margin-bottom:20px; }
.card h2 { color:#94a3b8; font-size:14px; text-transform:uppercase; margin-bottom:12px; }
table { width:100%; border-collapse:collapse; }
th, td { text-align:left; padding:10px 8px; border-bottom:1px solid #334155; font-size:13px; }
th { color:#64748b; font-weight:600; }
.badge { display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:600; }
.badge-green { background:#166534; color:#86efac; }
.badge-blue { background:#1e3a5f; color:#93c5fd; }
.badge-yellow { background:#713f12; color:#fde68a; }
.badge-red { background:#7f1d1d; color:#fca5a5; }
.badge-purple { background:#4c1d95; color:#c4b5fd; }
.grid-4 { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; }
.stat { text-align:center; padding:16px; }
.stat-value { font-size:28px; font-weight:700; }
.stat-label { color:#64748b; font-size:11px; margin-top:4px; }
@media(max-width:768px) { .grid-4 { grid-template-columns:1fr 1fr; } }
</style>
</head>
<body>
<h1>🤖 AI Assistant Dashboard</h1>

<div class="grid-4">
  <div class="card stat"><div class="stat-value" id="totalSessions" style="color:#38bdf8">0</div><div class="stat-label">AI Sessions</div></div>
  <div class="card stat"><div class="stat-value" id="totalClassifications" style="color:#22c55e">0</div><div class="stat-label">Classifications</div></div>
  <div class="card stat"><div class="stat-value" id="totalPredictions" style="color:#f59e0b">0</div><div class="stat-label">Predictions</div></div>
  <div class="card stat"><div class="stat-value" id="totalCostEstimates" style="color:#a855f7">0</div><div class="stat-label">Cost Estimates</div></div>
</div>

<div class="card">
  <h2>💬 Recent AI Conversations</h2>
  <table><thead><tr><th>Session</th><th>Project</th><th>Messages</th><th>Last Activity</th><th>Status</th></tr></thead>
  <tbody id="sessionsTable"></tbody></table>
</div>

<div class="card">
  <h2>📋 Recent Classifications</h2>
  <table><thead><tr><th>Document</th><th>Category</th><th>Confidence</th><th>Model</th><th>Date</th></tr></thead>
  <tbody id="classificationsTable"></tbody></table>
</div>

<div class="card">
  <h2>🔮 Recent Predictions</h2>
  <table><thead><tr><th>Type</th><th>Prediction</th><th>Confidence</th><th>Status</th><th>Date</th></tr></thead>
  <tbody id="predictionsTable"></tbody></table>
</div>

<script>
const API = '/api/v1';

async function api(path, opts={}) {
  const res = await fetch(API + path, { headers: {'Content-Type':'application/json', ...opts.headers}, ...opts });
  return res.json();
}

async function loadData() {
  // Sessions
  const sessData = await api('/ai/sessions');
  const sessions = sessData.data || [];
  document.getElementById('totalSessions').textContent = sessions.length;
  document.getElementById('sessionsTable').innerHTML = sessions.slice(0,20).map(s => `
    <tr><td>${s.id?.substring(0,8)||'—'}</td><td>${s.project_id?.substring(0,8)||'—'}</td><td>${s.message_count||0}</td><td>${s.updated_at ? new Date(s.updated_at).toLocaleString() : '—'}</td><td><span class="badge ${s.is_active ? 'badge-green' : 'badge-gray'}">${s.is_active ? 'Active' : 'Closed'}</span></td></tr>
  `).join('');

  // Classifications
  const clsData = await api('/ai/classifications');
  const cls = clsData.data || [];
  document.getElementById('totalClassifications').textContent = cls.length;
  document.getElementById('classificationsTable').innerHTML = cls.slice(0,20).map(c => `
    <tr><td>${c.document_name||c.source||'—'}</td><td><span class="badge badge-purple">${c.category||c.classification||'—'}</span></td><td>${c.confidence ? (c.confidence*100).toFixed(0)+'%' : '—'}</td><td>${c.model_used||'—'}</td><td>${c.created_at ? new Date(c.created_at).toLocaleDateString() : '—'}</td></tr>
  `).join('');

  // Predictions
  const predData = await api('/ai/predictions');
  const preds = predData.data || [];
  document.getElementById('totalPredictions').textContent = preds.length;
  document.getElementById('predictionsTable').innerHTML = preds.slice(0,20).map(p => `
    <tr><td><span class="badge badge-blue">${p.prediction_type||p.type||'—'}</span></td><td>${p.prediction||p.result||'—'}</td><td>${p.confidence ? (p.confidence*100).toFixed(0)+'%' : '—'}</td><td><span class="badge ${p.status==='active'?'badge-green':'badge-gray'}">${p.status||'—'}</span></td><td>${p.created_at ? new Date(p.created_at).toLocaleDateString() : '—'}</td></tr>
  `).join('');

  // Cost estimates
  const costData = await api('/ai/cost-estimates');
  const costs = costData.data || [];
  document.getElementById('totalCostEstimates').textContent = costs.length;
}

loadData();
setInterval(loadData, 30000);
</script>
</body>
</html>
