<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenConstructionERP — Fleet Management</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f172a;color:#e2e8f0}
.header{background:linear-gradient(135deg,#1e293b 0%,#0f172a 100%);border-bottom:1px solid #334155;padding:20px 30px;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:24px;font-weight:700;color:#f8fafc}
.header h1 span{color:#3b82f6}
.header .sub{color:#94a3b8;font-size:14px}
.controls{padding:16px 30px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;background:#1e293b;border-bottom:1px solid #334155}
.controls select,.controls button{padding:8px 16px;border-radius:8px;border:1px solid #334155;background:#0f172a;color:#e2e8f0;font-size:14px;cursor:pointer}
.controls button{background:#3b82f6;color:#fff;border:none;font-weight:600}
.controls button:hover{background:#2563eb}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;padding:20px 30px}
.stat-card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:16px;text-align:center}
.stat-card .label{color:#94a3b8;font-size:11px;text-transform:uppercase;letter-spacing:0.5px}
.stat-card .value{font-size:22px;font-weight:700;margin-top:6px}
.stat-card .value.green{color:#22c55e}
.stat-card .value.blue{color:#3b82f6}
.stat-card .value.yellow{color:#eab308}
.stat-card .value.red{color:#ef4444}
.charts,.tables-charts{display:grid;grid-template-columns:repeat(auto-fit,minmax(450px,1fr));gap:20px;padding:0 30px 20px}
.chart-card{background:#024d5b;border:1px solid #334155;border-radius:12px;padding:20px}
.chart-card h3{color:#fff;font-size:15px;margin-bottom:14px}
.chart-card canvas{max-height:280px;width:100%!important}
.tables{display:grid;grid-template-columns:1fr 1fr;gap:20px;padding:0 30px 30px}
.table-card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:20px;overflow-x:auto}
.table-card h3{color:#f8fafc;font-size:15px;margin-bottom:12px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 6px;border-bottom:2px solid #334155;color:#94a3b8;font-size:11px;text-transform:uppercase}
td{padding:8px 6px;border-bottom:1px solid #1e293b}
tr:hover td{background:#1a1f2e}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px}
.badge-green{background:#1a3a2a;color:#4ade80}
.badge-red{background:#3a1a1a;color:#f87171}
.badge-yellow{background:#3a2a1a;color:#fbbf24}
.badge-blue{background:#1a2a3a;color:#60a5fa}
@media(max-width:768px){.charts,.tables{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="header">
  <div><h1>🚛 <span>OpenConstructionERP</span> — Fleet</h1><div class="sub">V032 • Vehicles, Drivers, Fuel, Maintenance, Tracking, Accidents</div></div>
  <div style="text-align:right;font-size:12px;color:#64748b" id="updateTime"></div>
</div>
<div class="controls">
  <label style="color:#94a3b8;font-size:13px">Vehicle Type:</label>
  <select id="typeFilter"><option value="">— All —</option><option>dump_truck</option><option>excavator</option><option>crane</option><option>pickup</option></select>
  <button onclick="loadData()">Refresh</button>
</div>
<div class="stats" id="statsKpi"></div>
<div class="charts">
  <div class="chart-card"><h3>🚛 Vehicles by Type</h3><canvas id="vehicleTypeChart"></canvas></div>
  <div class="chart-card"><h3>⛽ Fuel Cost by Month</h3><canvas id="fuelChart"></canvas></div>
  <div class="chart-card"><h3>🔧 Maintenance by Type</h3><canvas id="maintenanceChart"></canvas></div>
  <div class="chart-card"><h3>⚠️ Accident Severity</h3><canvas id="accidentChart"></canvas></div>
</div>
<div class="tables">
  <div class="table-card"><h3>🚛 Fleet Vehicles</h3><table><thead><tr><th>Vehicle#</th><th>Type</th><th>Make/Model</th><th>Meter</th><th>Status</th></tr></thead><tbody id="vehicleTable"></tbody></table></div>
  <div class="table-card"><h3>👤 Drivers</h3><table><thead><tr><th>Name</th><th>License</th><th>Vehicle</th><th>Status</th></tr></thead><tbody id="driverTable"></tbody></table></div>
</div>
<script>
const API_BASE = '/api/v1/protected/fleet';
let CHART_INSTANCES = {};
const COLORS = ['#3b82f6','#22c55e','#a855f7','#f97316','#ef4444','#eab308','#06b6d4'];

async function loadData() {
  try {
    const [vehicles, drivers, fuel, maint, tracking, accidents] = await Promise.all([
      fetch(`${API_BASE}/vehicles`).then(r=>r.ok?r.json():[]),
      fetch(`${API_BASE}/drivers`).then(r=>r.ok?r.json():[]),
      fetch(`${API_BASE}/fuel`).then(r=>r.ok?r.json():[]),
      fetch(`${API_BASE}/maintenance`).then(r=>r.ok?r.json():[]),
      fetch(`${API_BASE}/tracking`).then(r=>r.ok?r.json():[]).catch(()=>[]),
      fetch(`${API_BASE}/accidents`).then(r=>r.ok?r.json():[]),
    ]);
    renderDashboard(vehicles, drivers, fuel, maint, accidents);
  } catch(e) {
    const m = genMock();
    renderDashboard(m.vehicles, m.drivers, m.fuel, m.maintenance, m.accidents);
  }
}
function genMock() {
  const vehicles = Array.from({length:15},(_,i)=>({vehicle_number:`V-${i+1}`,vehicle_type:['dump_truck','excavator','pickup','crane','concrete_mixer'][i%5],make:['Scania','Caterpillar','Toyota','Liebherr','Volvo'][i%5],model:['G460','336','Hilux','LTM1050','FH16'][i%5],current_meter_km:Math.random()*200000,status:['active','active','in_maintenance','active'][i%4]}));
  const drivers = Array.from({length:10},(_,i)=>({id:`d${i}`,full_name:`Driver ${i+1} ${['A.','B.','C.'][i%3]}${['Smith','Jones', 'Brown'][i%3]}`,license_number:`LIC${i}${i}${i}${i}`,assigned_vehicle_id:i<5?`v${i}`:null,status:['active','on_leave','suspended'][i%3]}));
  const fuel = Array.from({length:40},(_,i)=>({refuel_date: new Date(Date.now() - Math.random()*90*86400000).toISOString().slice(0,10), total_cost: Math.random()*100000+10000}));
  const maintenance = Array.from({length:20},(_,i)=>({maintenance_type:['routine','repair','engine','tire'][i%4],cost:Math.random()*200000+5000,status:['completed','in_progress','planned'][i%3]}));
  const accidents = Array.from({length:6},(_,i)=>({severity:['minor','moderate','serious','fatal'][i%4],property_damage_cost:Math.random()*500000+10000}));
  return {vehicles, drivers, fuel, maintenance, accidents};
}
function renderDashboard(vehicles, drivers, fuel, maintenance, accidents) {
  document.getElementById('updateTime').textContent = new Date().toISOString().slice(0,19).replace('T',' ');
  const active = vehicles.filter(v=>v.status==='active').length;
  const totalFuel = fuel.reduce((s,f)=>s+(f.total_cost||0),0);
  const totalMaint = maintenance.reduce((s,m)=>s+(m.cost||0),0);
  document.getElementById('statsKpi').innerHTML = `
    <div class="stat-card"><div class="label">Total Vehicles</div><div class="value blue">${vehicles.length}</div></div>
    <div class="stat-card"><div class="label">Active</div><div class="value green">${active}</div></div>
    <div class="stat-card"><div class="label">Drivers</div><div class="value purple">${drivers.length}</div></div>
    <div class="stat-card"><div class="label">Fuel Cost</div><div class="value yellow">$${(totalFuel/1e6).toFixed(2)}M</div></div>
    <div class="stat-card"><div class="label">Maint. Cost</div><div class="value blue">$${(totalMaint/1e6).toFixed(2)}M</div></div>
    <div class="stat-card"><div class="label">Accidents</div><div class="value red">${accidents.length}</div></div>`;
  const vg = {}; vehicles.forEach(v => { vg[v.vehicle_type||'other'] = (vg[v.vehicle_type||'other']||0)+1; });
  renderChart('vehicleTypeChart','doughnut',Object.keys(vg),Object.values(vg),COLORS,'Vehicles');
  const fg = {}; fuel.forEach(f => { const m = (f.refuel_date||'').slice(0,7); if(m) fg[m]=(fg[m]||0)+(f.total_cost||0); });
  const fLabels = Object.keys(fg).sort();
  renderChart('fuelChart','bar',fLabels.slice(-6),fLabels.slice(-6).map(l=>fg[l]),'#f97316','Fuel Cost');
  const mg = {}; maintenance.forEach(m => { mg[m.maintenance_type||'other'] = (mg[m.maintenance_type||'other']||0)+1; });
  renderChart('maintenanceChart','pie',Object.keys(mg),Object.values(mg),['#22c55e','#3b82f6','#eab308','#ef4444','#a855f7'],'Maintenance');
  const ag = {}; accidents.forEach(a => { ag[a.severity||'unknown'] = (ag[a.severity||'unknown']||0)+1; });
  renderChart('accidentChart','doughnut',Object.keys(ag),Object.values(ag),['#22c55e','#eab308','#f97316','#ef4444'],'Accidents');
  renderVehicleTable(vehicles);
  renderDriverTable(drivers);
}
function renderChart(id, type, labels, data, colors, label) {
  if(CHART_INSTANCES[id]) CHART_INSTANCES[id].destroy();
  const ctx = document.getElementById(id).getContext('2d');
  CHART_INSTANCES[id] = new Chart(ctx, {
    type, data: { labels, datasets: [{ label: label||'', data, backgroundColor: Array.isArray(colors)?colors:[colors], borderColor: Array.isArray(colors)?colors:'#1e293b', borderWidth: 1 }]},
    options: { responsive:true, maintainAspectRatio:true, plugins: { legend: { labels: { color:'#94a3b8', font:{size:11} } } },
      scales: type==='bar' ? { y: { beginAtZero:true, ticks: { color:'#64748b', font:{size:10}, callback:v=>'$'+(v/1e6).toFixed(2)+'M' }, grid: { color:'#1e293b' } }, x: { ticks: { color:'#64748b', font:{size:10} } } } : {} }
  });
}
function renderVehicleTable(vehicles) {
  document.getElementById('vehicleTable').innerHTML = vehicles.slice(0,15).map(v => `
    <tr><td>${v.vehicle_number||''}</td><td>${(v.vehicle_type||'').replace(/_/g,' ')}</td><td>${v.make||''} ${v.model||''}</td>
    <td>${((v.current_meter_km||0)/1000).toFixed(0)}k km</td>
    <td><span class="badge badge-${v.status==='active'?'green':v.status==='in_maintenance'?'yellow':'red'}">${v.status||''}</span></td></tr>
  `).join('');
}
function renderDriverTable(drivers) {
  document.getElementById('driverTable').innerHTML = drivers.map(d => `
    <tr><td>${d.full_name||''}</td><td>${d.license_number||''}</td><td>${d.assigned_vehicle_id||'—'}</td>
    <td><span class="badge badge-${d.status==='active'?'green':d.status==='on_leave'?'yellow':'red'}">${d.status||''}</span></td></tr>
  `).join('');
}
document.addEventListener('DOMContentLoaded', loadData);
</script>
</body>
</html>
