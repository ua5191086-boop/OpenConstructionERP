<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Integrations — OpenConstructionERP</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:#0f172a; color:#e2e8f0; padding:20px; }
h1 { color:#38bdf8; margin-bottom:20px; }
.card { background:#1e293b; border-radius:12px; padding:20px; margin-bottom:20px; }
.card h2 { color:#94a3b8; font-size:14px; text-transform:uppercase; margin-bottom:12px; }
table { width:100%; border-collapse:collapse; }
th, td { text-align:left; padding:10px 8px; border-bottom:1px solid #334155; font-size:13px; }
th { color:#64748b; font-weight:600; }
.badge { display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:600; }
.badge-green { background:#166534; color:#86efac; }
.badge-blue { background:#1e3a5f; color:#93c5fd; }
.badge-yellow { background:#713f12; color:#fde68a; }
.badge-red { background:#7f1d1d; color:#fca5a5; }
.badge-gray { background:#334155; color:#94a3b8; }
.grid-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:20px; }
.stat { text-align:center; padding:20px; }
.stat-value { font-size:32px; font-weight:700; color:#38bdf8; }
.stat-label { color:#64748b; font-size:12px; margin-top:4px; }
@media(max-width:768px) { .grid-3 { grid-template-columns:1fr; } }
</style>
</head>
<body>
<h1>🔗 Integration Hub</h1>

<div class="grid-3">
  <div class="card stat">
    <div class="stat-value" id="totalSystems">0</div>
    <div class="stat-label">Connected Systems</div>
  </div>
  <div class="card stat">
    <div class="stat-value" id="totalSyncs">0</div>
    <div class="stat-label">Sync Operations</div>
  </div>
  <div class="card stat">
    <div class="stat-value" id="failedSyncs">0</div>
    <div class="stat-label">Failed Syncs</div>
  </div>
</div>

<div class="card">
  <h2>🔄 Connected Systems</h2>
  <table>
    <thead><tr><th>System</th><th>Type</th><th>Status</th><th>Last Sync</th><th>Sync Count</th><th>Actions</th></tr></thead>
    <tbody id="systemsTable"></tbody>
  </table>
</div>

<div class="card">
  <h2>📋 Sync Log</h2>
  <table>
    <thead><tr><th>System</th><th>Entity</th><th>Direction</th><th>Status</th><th>Records</th><th>Error</th><th>Time</th></tr></thead>
    <tbody id="syncLogTable"></tbody>
  </table>
</div>

<script>
const API = '/api/v1';

async function api(path, opts={}) {
  const res = await fetch(API + path, {
    headers: {'Content-Type':'application/json', ...opts.headers},
    ...opts
  });
  return res.json();
}

async function loadData() {
  // Load integration systems
  const sysData = await api('/integrations/systems');
  const systems = sysData.data || [];
  document.getElementById('totalSystems').textContent = systems.length;

  const sysTbody = document.getElementById('systemsTable');
  sysTbody.innerHTML = systems.map(s => `
    <tr>
      <td><strong>${s.system_name || s.code || '—'}</strong></td>
      <td><span class="badge badge-blue">${s.system_type || 'generic'}</span></td>
      <td><span class="badge ${s.is_active ? 'badge-green' : 'badge-gray'}">${s.is_active ? 'Active' : 'Inactive'}</span></td>
      <td>${s.last_sync_at ? new Date(s.last_sync_at).toLocaleString() : 'Never'}</td>
      <td>${s.sync_count || 0}</td>
      <td>
        <button class="btn btn-sm btn-primary" onclick="syncSystem('${s.id}')">Sync Now</button>
      </td>
    </tr>
  `).join('');

  // Load sync log
  const logData = await api('/integrations/sync-log');
  const logs = logData.data || [];
  document.getElementById('totalSyncs').textContent = logs.length;
  document.getElementById('failedSyncs').textContent = logs.filter(l => l.status === 'failed').length;

  const logTbody = document.getElementById('syncLogTable');
  logTbody.innerHTML = logs.slice(0,100).map(l => `
    <tr>
      <td>${l.system_name || '—'}</td>
      <td>${l.entity_type || '—'}</td>
      <td><span class="badge badge-blue">${l.direction || 'both'}</span></td>
      <td><span class="badge ${l.status === 'success' ? 'badge-green' : l.status === 'failed' ? 'badge-red' : 'badge-yellow'}">${l.status || 'pending'}</span></td>
      <td>${l.records_processed || 0}</td>
      <td style="color:#f87171;font-size:11px">${l.error_message ? l.error_message.substring(0,50) : '—'}</td>
      <td>${l.synced_at ? new Date(l.synced_at).toLocaleString() : '—'}</td>
    </tr>
  `).join('');
}

async function syncSystem(id) {
  await api(`/integration/systems/${id}/sync`, { method: 'POST' });
  loadData();
}

loadData();
setInterval(loadData, 30000);
</script>
</body>
</html>
