<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Risk Management — OpenConstructionERP</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
.container { max-width: 1400px; margin: 0 auto; padding: 20px; }
.header { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); padding: 20px 30px; border-radius: 12px; margin-bottom: 24px; border: 1px solid #334155; }
.header h1 { font-size: 24px; color: #f1f5f9; }
.header p { color: #94a3b8; font-size: 14px; margin-top: 4px; }
.filters { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
.filters select, .filters button { background: #1e293b; border: 1px solid #334155; color: #e2e8f0; padding: 10px 16px; border-radius: 8px; font-size: 14px; }
.filters button { background: #3b82f6; border-color: #3b82f6; cursor: pointer; font-weight: 600; }
.filters button.run { background: #f59e0b; border-color: #f59e0b; }
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
.stat-card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 20px; }
.stat-card .label { font-size: 12px; text-transform: uppercase; color: #94a3b8; letter-spacing: 0.5px; }
.stat-card .value { font-size: 28px; font-weight: 700; margin-top: 8px; }
.stat-card .sub { font-size: 13px; color: #64748b; margin-top: 4px; }
.stat-card.danger { border-left: 3px solid #ef4444; }
.stat-card.warning { border-left: 3px solid #f59e0b; }
.stat-card.success { border-left: 3px solid #22c55e; }
.stat-card.info { border-left: 3px solid #3b82f6; }
.stat-card.extreme { border-left: 3px solid #7c3aed; }
.charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
.chart-card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 20px; margin-bottom: 24px; }
.chart-card h3 { font-size: 14px; color: #94a3b8; margin-bottom: 16px; text-transform: uppercase; letter-spacing: 0.5px; }
.table-card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 20px; margin-bottom: 24px; overflow-x: auto; }
.mc-result { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 20px; margin-bottom: 24px; display: none; }
table { width: 100%; border-collapse: collapse; }
th { text-align: left; padding: 12px 8px; font-size: 12px; color: #94a3b8; text-transform: uppercase; border-bottom: 1px solid #334155; }
td { padding: 10px 8px; border-bottom: 1px solid #1e293b; font-size: 13px; }
tr:hover { background: #1e293b; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
.badge-extreme { background: #4c1d95; color: #c4b5fd; }
.badge-high { background: #991b1b; color: #fca5a5; }
.badge-med { background: #854d0e; color: #fde047; }
.badge-low { background: #166534; color: #86efac; }
.badge-green { background: #166534; color: #86efac; }
.badge-yellow { background: #854d0e; color: #fde047; }
.badge-red { background: #991b1b; color: #fca5a5; }
.badge-blue { background: #1e3a5f; color: #93c5fd; }
.progress-bar { width: 100%; height: 8px; background: #1e293b; border-radius: 4px; overflow: hidden; }
.progress-bar .fill { height: 100%; border-radius: 4px; }
.loading { text-align: center; padding: 60px; color: #64748b; }
.loading .spinner { width: 40px; height: 40px; border: 3px solid #334155; border-top-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px; }
@keyframes spin { to { transform: rotate(360deg); } }
.error { text-align: center; padding: 40px; color: #fca5a5; }
.tabs { display: flex; gap: 4px; margin-bottom: 16px; background: #1e293b; border-radius: 8px; padding: 4px; border: 1px solid #334155; }
.tab { padding: 8px 20px; border-radius: 6px; cursor: pointer; font-size: 13px; color: #94a3b8; }
.tab.active { background: #3b82f6; color: white; }
.p10 { color: #22c55e; } .p50 { color: #fde047; } .p90 { color: #ef4444; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>⚠️ Risk Management</h1>
    <p>Реестр рисков, Monte Carlo симуляция, Mitigation, Escalation</p>
  </div>

  <div class="filters">
    <select id="projectSelect" style="display:none"></select>
    <button onclick="loadData()">📊 Загрузить</button>
    <button class="run" onclick="runMC()">🎲 Запустить Monte Carlo</button>
  </div>

  <div class="stats-grid" id="statsGrid" style="display:none"></div>
  <div class="charts-row" id="chartsRow" style="display:none"></div>
  <div class="mc-result" id="mcResult"></div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('register')">📋 Реестр рисков</div>
    <div class="tab" onclick="switchTab('mitigations')">🛡️ Mitigations</div>
    <div class="tab" onclick="switchTab('mc')">🎲 Monte Carlo</div>
  </div>
  <div class="table-card active" id="tab-register"></div>
  <div class="table-card" id="tab-mitigations"></div>
  <div class="table-card" id="tab-mc"></div>
</div>

<script>
let risks = [], mitigations = [], mcRuns = [];

async function loadData() {
  document.getElementById('statsGrid').innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  try {
    const [s, r, m, mc] = await Promise.all([
      fetch('/api/v1/protected/risk/summary').then(r => r.ok ? r.json() : []),
      fetch('/api/v1/protected/risk/registers').then(r => r.ok ? r.json() : []),
      fetch('/api/v1/protected/risk/mitigations').then(r => r.ok ? r.json() : []),
      fetch('/api/v1/protected/risk/monte-carlo').then(r => r.ok ? r.json() : []),
    ]);
    risks = Array.isArray(r) ? r : [];
    mitigations = Array.isArray(m) ? m : [];
    mcRuns = Array.isArray(mc) ? mc : [];
    const summary = Array.isArray(s) && s.length > 0 ? s[0] : {};
    render(summary);
  } catch(e) {
    document.getElementById('statsGrid').innerHTML = `<div class="error">❌ ${e.message}</div>`;
  }
}

function render(s) {
  document.getElementById('statsGrid').style.display = 'grid';
  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card info"><div class="label">Всего рисков</div><div class="value">${s.total_risks || 0}</div><div class="sub">${s.open_risks || 0} открыто</div></div>
    <div class="stat-card extreme"><div class="label">Экстремальные</div><div class="value">${s.extreme_risks || 0}</div></div>
    <div class="stat-card danger"><div class="label">Высокие</div><div class="value">${s.high_risks || 0}</div></div>
    <div class="stat-card warning"><div class="label">Угрозы / Возможности</div><div class="value">${s.threats || 0} / ${s.opportunities || 0}</div></div>
    <div class="stat-card danger"><div class="label">Стоимость угроз</div><div class="value">$${(s.total_threat_cost || 0).toLocaleString()}</div></div>
    <div class="stat-card ${(s.pending_mitigations || 0) > 0 ? 'warning' : 'success'}"><div class="label">Mitigations</div><div class="value">${s.completed_mitigations || 0} / ${(s.pending_mitigations || 0) + (s.completed_mitigations || 0)}</div><div class="sub">завершено</div></div>
    <div class="stat-card info"><div class="label">MC Runs</div><div class="value">${s.mc_runs_completed || 0}</div></div>
    <div class="stat-card info"><div class="label">Сценарии</div><div class="value">${s.analyzed_scenarios || 0}</div></div>
  `;

  document.getElementById('chartsRow').style.display = 'grid';
  document.getElementById('chartsRow').innerHTML = `
    <div class="chart-card"><h3>📊 Риски по категориям</h3><canvas id="ratingChart"></canvas></div>
    <div class="chart-card"><h3>📈 Cost Impact Distribution</h3><canvas id="costChart"></canvas></div>
  `;

  const ratings = {extreme:0, high:0, medium:0, low:0, very_low:0};
  risks.forEach(r => { const rt = (r.risk_rating || 'low').toLowerCase(); ratings[rt] = (ratings[rt]||0)+1; });
  new Chart(document.getElementById('ratingChart'), {
    type: 'pie',
    data: { labels: Object.keys(ratings), datasets: [{ data: Object.values(ratings), backgroundColor: ['#7c3aed','#ef4444','#f59e0b','#22c55e','#3b82f6'], borderWidth: 0 }] },
    options: { responsive: true, plugins: { legend: { position: 'right', labels: { color: '#94a3b8' } } } }
  });

  const costData = risks.filter(r => r.cost_impact > 0).map(r => r.cost_impact);
  new Chart(document.getElementById('costChart'), {
    type: 'bar',
    data: { labels: costData.map((_,i) => i+1), datasets: [{ label: 'Стоимость риска', data: costData, backgroundColor: costData.map(v => v > 100000 ? '#ef4444' : v > 50000 ? '#f59e0b' : '#3b82f6'), borderRadius: 4 }] },
    options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { ticks: { color: '#64748b' } }, x: { display: false } } }
  });

  renderRegister();
  renderMitigations();
  renderMC();
}

function renderRegister() {
  document.getElementById('tab-register').innerHTML = `
    <h3 style="font-size:14px;color:#94a3b8;margin-bottom:16px;text-transform:uppercase;">📋 Реестр рисков (${risks.length})</h3>
    <table>
      <thead><tr><th>Код</th><th>Наименование</th><th>Категория</th><th>Тип</th><th>P</th><th>I</th><th>Рейтинг</th><th>Стоимость</th><th>Ответ</th><th>Статус</th></tr></thead>
      <tbody>
        ${risks.map(r => {
          const rtBadge = r.risk_rating === 'extreme' ? 'badge-extreme' : r.risk_rating === 'high' ? 'badge-high' : r.risk_rating === 'medium' ? 'badge-med' : 'badge-low';
          const stBadge = r.status === 'closed' ? 'badge-green' : r.status === 'monitoring' ? 'badge-yellow' : 'badge-blue';
          return `<tr>
            <td><strong>${r.risk_code || ''}</strong></td>
            <td>${r.risk_name || ''}</td>
            <td>${r.category_id ? r.category_id.substring(0,8) : '-'}</td>
            <td>${r.risk_type === 'threat' ? '⚠️' : '💡'}</td>
            <td>${r.probability_score || '-'}</td>
            <td>${r.impact_score || '-'}</td>
            <td><span class="badge ${rtBadge}">${r.risk_rating || ''}</span></td>
            <td>$${(r.cost_impact || 0).toLocaleString()}</td>
            <td><span class="badge badge-blue">${r.risk_response || ''}</span></td>
            <td><span class="badge ${stBadge}">${r.status || ''}</span></td>
          </tr>`;
        }).join('')}
        ${risks.length === 0 ? '<tr><td colspan="10" style="text-align:center;padding:40px;color:#64748b">Нет рисков. Создайте через API.</td></tr>' : ''}
      </tbody>
    </table>
  `;
}

function renderMitigations() {
  document.getElementById('tab-mitigations').innerHTML = `
    <h3 style="font-size:14px;color:#94a3b8;margin-bottom:16px;text-transform:uppercase;">🛡️ Mitigation Actions (${mitigations.length})</h3>
    <table>
      <thead><tr><th>Код</th><th>Наименование</th><th>Тип</th><th>Assignee</th><th>Бюджет</th><th>Эффективность</th><th>Статус</th></tr></thead>
      <tbody>
        ${mitigations.map(m => `<tr>
          <td><strong>${m.action_code || ''}</strong></td>
          <td>${m.action_name || ''}</td>
          <td><span class="badge badge-blue">${m.action_type || ''}</span></td>
          <td>${m.assigned_to || '-'}</td>
          <td>$${(m.budget || 0).toLocaleString()}</td>
          <td><span class="badge ${m.effectiveness === 'effective' ? 'badge-green' : m.effectiveness === 'partially_effective' ? 'badge-yellow' : 'badge-blue'}">${m.effectiveness || '—'}</span></td>
          <td><span class="badge ${m.status === 'completed' ? 'badge-green' : m.status === 'in_progress' ? 'badge-yellow' : 'badge-blue'}">${m.status || ''}</span></td>
        </tr>`).join('')}
        ${mitigations.length === 0 ? '<tr><td colspan="7" style="text-align:center;padding:40px;color:#64748b">Нет mitigation actions</td></tr>' : ''}
      </tbody>
    </table>
  `;
}

function renderMC() {
  document.getElementById('tab-mc').innerHTML = `
    <h3 style="font-size:14px;color:#94a3b8;margin-bottom:16px;text-transform:uppercase;">🎲 Monte Carlo Runs (${mcRuns.length})</h3>
    <table>
      <thead><tr><th>Run</th><th>Тип</th><th>Итераций</th><th class="p10">P10</th><th class="p50">P50</th><th class="p90">P90</th><th>Mean</th><th>Статус</th></tr></thead>
      <tbody>
        ${mcRuns.map(mc => `<tr>
          <td><strong>${mc.run_label || ''}</strong></td>
          <td><span class="badge badge-blue">${mc.run_type || ''}</span></td>
          <td>${mc.iterations || 0}</td>
          <td class="p10">$${(mc.p10_value || 0).toLocaleString()}</td>
          <td class="p50">$${(mc.p50_value || 0).toLocaleString()}</td>
          <td class="p90">$${(mc.p90_value || 0).toLocaleString()}</td>
          <td>$${(mc.mean_value || 0).toLocaleString()}</td>
          <td><span class="badge ${mc.status === 'completed' ? 'badge-green' : mc.status === 'running' ? 'badge-yellow' : 'badge-blue'}">${mc.status || ''}</span></td>
        </tr>`).join('')}
        ${mcRuns.length === 0 ? '<tr><td colspan="8" style="text-align:center;padding:40px;color:#64748b">Нет MC run. Нажмите "Запустить Monte Carlo".</td></tr>' : ''}
      </tbody>
    </table>
  `;
}

async function runMC() {
  // Create a quick MC run
  const runId = crypto.randomUUID ? crypto.randomUUID() : Date.now().toString();
  try {
    const createResp = await fetch('/api/v1/protected/risk/monte-carlo', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({project_id: '00000000-0000-0000-0000-000000000001', run_label: 'Quick MC ' + new Date().toLocaleDateString(), run_type: 'cost', iterations: 5000})
    });
    if (!createResp.ok) throw new Error('Create failed');
    const created = await createResp.json();

    document.getElementById('mcResult').style.display = 'block';
    document.getElementById('mcResult').innerHTML = '<div class="loading"><div class="spinner"></div>Running Monte Carlo (5,000 iterations)...</div>';

    const runResp = await fetch(`/api/v1/protected/risk/monte-carlo/run/${created.id}`, {method: 'POST'});
    if (!runResp.ok) throw new Error('MC run failed');
    const result = await runResp.json();

    document.getElementById('mcResult').innerHTML = `
      <h3 style="font-size:14px;color:#94a3b8;margin-bottom:16px;text-transform:uppercase;">🎲 Результат Monte Carlo</h3>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px">
        <div style="background:#1e293b;padding:16px;border-radius:8px;border-left:3px solid #22c55e">
          <div style="font-size:11px;color:#94a3b8">P10 (оптимистичный)</div>
          <div style="font-size:24px;font-weight:700;color:#22c55e">$${(result.p10 || 0).toLocaleString()}</div>
        </div>
        <div style="background:#1e293b;padding:16px;border-radius:8px;border-left:3px solid #fde047">
          <div style="font-size:11px;color:#94a3b8">P50 (медиана)</div>
          <div style="font-size:24px;font-weight:700;color:#fde047">$${(result.p50 || 0).toLocaleString()}</div>
        </div>
        <div style="background:#1e293b;padding:16px;border-radius:8px;border-left:3px solid #ef4444">
          <div style="font-size:11px;color:#94a3b8">P90 (пессимистичный)</div>
          <div style="font-size:24px;font-weight:700;color:#ef4444">$${(result.p90 || 0).toLocaleString()}</div>
        </div>
        <div style="background:#1e293b;padding:16px;border-radius:8px;border-left:3px solid #3b82f6">
          <div style="font-size:11px;color:#94a3b8">Среднее (Mean)</div>
          <div style="font-size:24px;font-weight:700;color:#3b82f6">$${(result.mean || 0).toLocaleString()}</div>
        </div>
      </div>
      <div style="font-size:12px;color:#64748b;margin-bottom:16px">
        Итераций: ${result.iterations || 0} | StdDev: $${(result.stddev || 0).toLocaleString()} | Confidence: ${result.confidence_level || 0}% | Time: ${result.execution_time_ms || 0}ms
      </div>
      <canvas id="mcHistogram" style="max-height:250px"></canvas>
    `;

    if (result.histogram) {
      new Chart(document.getElementById('mcHistogram'), {
        type: 'bar',
        data: {
          labels: result.histogram.map(h => '$' + Math.round(h.low).toLocaleString()),
          datasets: [{ label: 'Частота', data: result.histogram.map(h => h.count || h.pct),
            backgroundColor: result.histogram.map(h => h.bin < 4 ? '#22c55e' : h.bin < 12 ? '#3b82f6' : h.bin < 16 ? '#f59e0b' : '#ef4444'),
            borderRadius: 2 }]
        },
        options: { responsive: true, plugins: { legend: { display: false } },
          scales: { y: { ticks: { color: '#64748b' } }, x: { ticks: { color: '#94a3b8', maxTicksLimit: 10 } } } }
      });
    }
    loadData();
  } catch(e) {
    document.getElementById('mcResult').innerHTML = `<div class="error">❌ ${e.message}</div>`;
  }
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.table-card').forEach(t => t.classList.remove('active'));
  document.querySelector(`.tab[onclick*="${name}"]`).classList.add('active');
  document.getElementById(`tab-${name}`).classList.add('active');
}

loadData();
</script>
</body>
</html>
